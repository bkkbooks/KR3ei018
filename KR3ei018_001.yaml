body:
  text: 卷一月經門諸論人身之病四百有四婦人之證與男子無殊其所異者惟月經孕育胎前産後崩淋帶下乳癰陰瘡諸病為閨房隱曲孫真人所謂婦人之病治療倍難於男子者此也經曰衝脈起於氣街並少陰之經挾臍上行至胸中而散滲灌諸陽下入於足為十二經絡之海其出入皆少陰經以行故為血海然沖任督三者一源而三歧也沖自少腹後臍兩旁而上行循腹以任於前為陰脈之總任督脈起自少腹循背以督於後為陽脈之都綱沖為血海諸經朝分男子則運而行之女子則停而止之運行者無積而不滿動也停止者有積而能滿靜也不滿者以時而溢謂之信男子以氣運故陽氣應日而一舉女子以血滿故陰血應月而一下沖任二脈奇經八脈之二也經云沖為血海作主胞胎一脈也通於任而下既行而空至七日後而漸滿如月之盈虧相似當知血海之有餘以十二經皆然非特血海之滿也故始得以行耳任脈者起於中極之下以上毛際循腹裡上關元至咽喉故曰陰脈之海任者妊也此人生養之始故曰任脈督脈者起於下極之俞並於脊裡上至風府入腦上顛循額至鼻柱督之為言都也是為陽脈之大綱也故云陽脈之海任脈主任一身之陰血太衝屬陽明為血之海故穀氣盛則血海滿而月事以時下也婦人月水本於四經二者衝任二者手太陽小腸手少陰心然沖為血海任主胞胎二者相資故令有子小腸經屬腑主表為陽少陰經為藏主裡屬陰此二經在上為乳汁在下為月水惟鳥獸無天癸而成胎蓋鳥獸惟知飲食交媾故運精血往來獨聚於尾閭也經云女子二七而天癸至天謂天真之氣癸為壬癸之水壬為陽水癸為陰水女子陰類沖為血海任主胞胎二脈流通經血漸盈應時而下天真氣降故曰天癸常以三旬一見以象月盈則虧不失其期故曰月信然名天癸者以比陰精也蓋腎屬水癸亦屬水由先天之氣畜極而生故謂陰精為天癸王冰以月事為天癸者非也男女之精皆可以天癸稱若以女子之血為天癸則男子之天癸亦為血耶男女交媾之時各有精而行經之際方有其血未聞交媾時可以血言也但女子之精二七而至其月事亦與此時同候也男子為陽陽中有陰陰中之數八故一八而陽精升二八而陽精溢女子為陰陰中有陽陽中之數七故一七而陰精升二七而陰血溢皆飲食五味之實秀也經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行東垣謂脾為生化之源心統諸經之血心脾平和則經候如常苟或七情內傷六淫內侵飲食失節起居不時脾胃虛損心火妄動則月經不調矣夫血生於脾土故云脾統血凡血病當用甘溫之藥以助陽氣而生陰血也血者水穀之精氣也和調五臟灑陳六腑在男子則化為精在婦人則上為乳汁下為月水故雖心主血肝藏血實皆統攝於脾補脾和胃血自生矣凡經行之際禁用苦寒之藥飲食亦然凡女子天癸未至之前為病多從心脾天癸既至之後多從肝腎婦人經水與乳俱由脾胃所生穀氣入胃其清純津液之氣歸於心入於脈變赤而為血血有餘則注於衝任而為經水經水者陰水也陰必從陽故其色赤稟火之色也沖為血海任主胞胎若男子媾精陰陽和合而成孕則其血皆移陰於胎矣既産則胃中清純津液之氣歸於肺朝於脈流入乳房變白為乳是稟肺金之色也若不自哺則陽明之竅不通胃中津液仍歸於脈變赤而腹為月水矣夫男女各有精凡房勞不節皆能大傷精氣故曰精枯殺人奈世人所論獨重男子不知書云女子嗜欲過於丈夫感病倍於男子況産蓐帶下三十六病損氣傷血挾症多端故女人尤宜清心節欲便是調經卻病之第一經病門諸論凡女人稟賦旺則十三歲即行稟賦怯則逾二七常是稟賦贏弱素多陰虛夜熱十八九尚未至者必因時滋補遲婚乃佳倘陰氣未全驟合男子多成癆怯若女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調未至合男亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫或雖合而難子合多則瀝枯虛人産乳衆則枯血殺人其言經者謂常候也若陽太過則先期而至陰不及則後時而來其有乍多乍少斷絶不行崩漏不行皆由陰陽盛衰所致陰氣乘陽則胞寒氣冷血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣乘陰經水沸騰故令乍多而在月前當別其陰陽謂其氣血使不相乘以平為期也婦人月水不調有因風冷乘虛客於胞中有傷衝任之脈蓋衝任之脈起於胞中將息順理則血氣調和六淫不能為害若勞傷氣血風冷乘之脾胃一傷飲食漸少榮衛日衰肌膚黃瘦皆由衝任勞損故凡經行最宜謹慎否則與産後成病相類婦人以血為海每因憂思忿怒鬱氣氣行則血行氣止則血止憂思過度則氣結而血亦結忿怒過度則氣逆而血亦逆如不及期而來者有火也宜六味淡水則火自平矣不及期而來多者本方加海螵蛸柴胡白芍五味子如半月或十日而來且綿延不止此屬氣虛用補中湯如過期而來者火衰也為寒為虛為郁為痰方加艾葉香附半夏如遲而色淡本方加桂此其略也其間亦有不及期而無火者有過期而有火者凡紫黑色者多屬火旺之甚亦有虛寒而紫黑者若淡白則無火明矣然更有挾痰而淡白者有挾濕痰帶黃而渾濁者故當兼以脈之遲數稟之強弱辨之經水者陰血也陰必從陽故其色紅上應於月月滿則虧月虧則盈其行有常故名月經為氣之配隨氣而行氣熱則熱氣寒則寒氣滯則滯成塊者氣之凝也將行而痛者氣之滯也行後作痛者氣血虛也錯經妄行者氣之亂也色淡者虛而有水混之也紫者氣之熱也黑者熱甚也今人一見紫黑成塊作痛率指為風冷乘之用溫熱之劑禍不旋踵經曰亢則害承乃制熱甚則兼水化所以熱則紫甚則黑也玉機曰寒則凝而不行既行而紫黑故知非寒也且婦人性多忿鬱嗜欲倍加臟腑厥陽之火無日不有非熱而何當以脈辨之而自見矣凡寒冷外邪初感入經必痛久則鬱而為熱且血寒則凝既行而雖紫黑乃非寒也如傷寒而為病熱也明矣有經行前臍腹絞痛如刺寒熱交作下如黑豆汁兩尺沉澀余皆弦急此由下焦寒濕之邪搏於衝任痛極則熱熱則流通因寒濕生濁故下如豆汁也宜治下焦以辛散苦寒血藥治之亦有血虛血澀者以養血藥佐以順氣經行體痛者蓋氣血盛陰陽和則形體通暢若外虧衛氣之充養內乏榮血之灌溉故經行身痛也或曰血海有餘者時至而溢血海不足有時至而周身之血亦傷故欲行而身體先痛也至於經行後腹痛尤屬氣血俱虛宜八珍湯然亦有虛中有熱者宜逍遙散亦有氣滯而經行未盡者宜四物加木香有經後發熱倦怠兩目如帛蔽不明者蓋脾為諸陰之首目為血脈之宗此脾陰虧損而五臟皆為失所不能歸明於目也用補中湯歸脾湯專主脾胃調補氣血目得血而自能視矣若誤以清涼明目為事反致變生大病有婦人經行必先瀉二三日然後經下診其脈皆濡弱者此脾腎兩虛也蓋脾統血經水將行脾氣運行血海不能滲濕固中矣腎主禁固月事應時而下癸元消耗於中而失禁固之權矣宜以歸脾加減溫補脾腎為主若經去過多白帶時下日輕夜重泄瀉無時者此陽虛下墮也命曰脫陽宜十全湯或補中湯主之婦人經閉不行者有因脾胃久虛形體羸弱氣血漸衰以致經水斷絶者或因勞心過度心火上行不得下通府脈是以月事不來者或因中消胃熱善飢漸瘦津液不生血海枯竭名曰血枯經絶者有因冷客胞門血寒凝泣而不下者有因軀肥脂滿痰多占住血海地位閉塞不行者有因或挾寒或挾熱而汙血凝滯不行者有因食與濕痰填塞太陰經閉作痛者寒熱虛實之迥然不同總不能遁乎脈之遲數有力無力間也經病有月候不調者有月候不通者然不調不通之中有兼疼痛者有兼發熱者不調之中有趲前者有退後者則趲前為熱退後為虛也不通之中有血滯者有血枯者則血滯宜行血枯宜補也疼痛之中有常時作痛者有經前經後作痛者則常時與經前作痛為血積經後為血虛也發熱之中有常時發熱者有經行發熱者則常時為血虛有積經行為血虛有熱也大抵多內因憂思忿怒外因飲冷形寒蓋人之氣血周流忽因憂思忿怒所觸則鬱結不行忽遇飲冷形寒則惡露不盡此經候不調不通作痛發熱之所由也調其氣而行其血開其鬱而補其虛涼其血而清其熱氣行血行氣止血止故治血病以熱藥為佐肉桂之類是也至於大病後經閉系屬氣血兩虛惟宜補脾養血元氣充復自然經通此不治而治也婦人以血為主經行與産後一般最宜謹慎其實若有瘀血一點未淨或被內寒濕熱暑邪或內傷生冷或浣濯入冷或誤食酸鹹七情鬱結凝積於中名曰血滯或經止後用力太過入房太甚及服食燥熱以致火動則邪氣盛而津液衰名曰血枯若經後被驚則血氣錯亂妄行逆於上則從口鼻出逆於身則血水相搏變為水腫恚怒則氣血逆於腰腿心腹背肋手足之間重痛經行則發怒極傷肝則有眩暈嘔血瘰癧血風瘡癢等病加之經血滲漏遂成竅血生瘡淋瀝不斷濕熱相搏為崩帶血結於內變癥瘕凡此變證百出不過血滯與血枯而已重則經閉不通致成癆瘵故犯時微若秋毫成患重於山嶽是以治女人諸病必先問經也血枯血隔皆經閉不通之候然枯之與隔有如水炭枯者竭也血虛極矣隔者隔阻也血本不虛而或氣或寒或積有所逆也隔者病發於暫其症或痛或實通之則行而愈若枯者其來有漸衝任內竭其證無形夫既枯矣大宜補養陰氣未至枯竭者氣血或可漸充如用通經峻削枯者愈枯斃可立待血滯經閉宜破者原因飲食毒熱或暴怒凝瘀積痰直須大黃乾漆之類推陳致新俾舊血消而新血生也若氣旺血枯起於勞役憂思自宜溫和滋補或兼有痰火濕熱尤宜清之涼之每以肉桂為佐者熱則血行也但不可純用峻藥以虧陰道惟宜補益榮衛調和飲食自然血氣流通苟不以根本為事惟圖峻藥攻之是求千金於乞丐矣有婦人生女子年十五來診言十四時經水自下今經反斷何也緣婦人年十四時亦經水下反以斷此為避年後當自下此天一之源而來積則一月而滿滿則溢似血而實非血也然衝任起於胞中男子藏精女子系胞而為其用者其間又恃一點命門之火為之主宰是以火旺則紅火衰則淡火太旺則紫火太衰則白所以滋水更當養火甚則乾涸不通者雖曰火盛之極亦由水虛之甚亦不宜以苦寒之藥降火只宜大補其水從天一之源以養之使滿滿則自能流行而溢萬無有毒藥可通之理也凡治病婦當先問娠不可倉卒蓋既有病則娠脈不能易辨故凡看婦人病脈不可純用破氣行血之藥恐有娠在疑似間也婦人之病比之男子十倍難療十四以上陰氣浮溢百想經心內傷五臟月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論嗜欲過於丈夫感病倍於男子加以愛憎嫉妒所以為病根深療之難瘥至於尼姑寡婦獨陰無陽悒鬱而傷心脾尤非草木易於奏功也有因先病而後經不調者有經不調而後生諸病者如先因病而後經不調當先治病病去則經自調若因經不調而後生病當先調經經調則病自除脈經曰尺脈滑血氣實婦人經脈不利尺脈來而斷絶者月水不利寸關如故尺脈絶不至者月水不利當患少腹痛肝脈沉月水不利主腰腹痛交加地黃丸治經水不調血塊氣痞肚腹疼痛生苄一斤老生薑一斤玄胡索當歸白芍川芎各二兩沒藥木香各一兩桃仁去皮尖人參各一兩五錢香附半斤上將地黃生薑各搗汁以生薑汁浸地黃渣地黃汁浸生薑渣各以汁盡為度次將余藥為末共作一處日乾同為末醋糊丸桐子大空心服五十丸薑湯下活血散治衝任經虛經事不調不拘多少前後並治白芍藥玄胡索當歸川芎各四兩肉桂去皮一兩每服四錢水煎食後熱服四制醋附丸治婦人女子經候不調香附子去毛一斤作四分一分好酒浸七日一分小便浸七日一分鹽水浸七日一分米醋浸七日谷焙乾為末醋糊丸如桐子大每服七十丸空心食前鹽酒送下肥人依方服瘦人加澤蘭葉赤茯苓各二兩按香附子血中元氣藥也婦人假血為本以氣為用今用香附子開鬱行氣氣行而血亦行矣但氣調而血枯血燥者用之非徒無益也當歸地黃丸治婦人血氣不和月事不勻腰腿疼痛當歸川芎白芍藥熟苄各五錢牡丹皮玄胡索各二錢五分人參黃耆各一錢二分半為末蜜丸桐子大每服三十丸食前米湯下通經丸治婦人室女經候不通臍腹疼痛或成血瘕川椒炒去汗蓬朮炒去煙青皮去白乾漆炒去煙當歸乾薑炒大黃炒桃仁炒紅花桂心各等分為末將一半用米醋熬成膏和余藥一半成劑臼中柞之丸桐子大陰乾每服五十丸醋湯溫酒空心下通經散治室女月水不通雄鼠屎一兩燒存性為末空心溫酒調下一錢神效血竭膏治乾血氣錦紋大黃酒浸曬乾四兩為末一升熬成膏丸如雞子大每服一丸熱酒化開待溫臨臥服大便一二行紅脈自下此藥調經水之仙藥也玄胡索湯治婦人室女七情所感血氣相併心腹疼痛或連腰脅甚作搐搦一切血氣經候不調玄胡索赤芍藥片子薑黃官桂不見人當歸去蘆蒲黃各五錢甘草一錢五分木香不見火乳香沒藥各三錢每服四錢薑水煎服如吐逆加半夏橘紅各五錢蠲痛散治婦人血氣刺痛荔枝核燒存性五錢香附炒一兩為末每服二錢淡鹽湯下失笑散治小腸氣痛婦人血氣痛欲死者五靈脂蒲黃各等分為末每服二錢用醋一合熬藥成膏入水一盞煎七分熱服小柴胡湯治婦人傷風七八日積得寒熱發作有時經水適斷此為熱入血室其血必結故如瘧狀柴胡八錢半夏二錢人參甘草黃芩生地各三錢麥冬二錢每服八錢薑棗水煎服治女人乾血勞方用陳麥曲四兩火煅存性為末每服一兩沖黃酒下出臭汗為驗忌麵食二十一日崩漏門諸論經曰悲哀太過則心系急肺布葉舉而上焦不通熱氣在中故血走而崩也又曰陰虛陽搏謂之崩然有得之悲哀者七情傷心之崩也有得之勞力者內傷勞倦之崩也崩者經血卒然大至或清或濁或純下瘀血如山之崩勢不可遏之謂也有崩甚腹痛人多疑惡血未盡又見血色瘀黑愈信惡血不敢止截殊不知血因經絡之氣而流行故能色鮮而不滯若一出經絡既失陽和復無氣運猶天寒風靜水即為冰停在腹中便為瘀血以瘀為惡又焉知瘀之不為虛冷乎瘀而腹痛血行則痛止崩而腹痛血住則痛止芎歸湯加薑附止其血而痛自止去以色黑為瘀血而盡去之則經絡中之乘虛而走者何時而生耶必氣脫人亡而後已甚有涎郁胸中清氣不升故經脈壅遏而降下非開涎則不足以行氣非氣升則血不能以歸隧道治宜二陳之類先服後吐之既開胸膈之痰涎復散鬱滯之濁氣則氣升濁降血歸隧道而不崩矣衝任為經脈之海凡血氣調適則外循經絡內榮臟腑經下依時若勞傷過極衝任氣虛不能約制經血乃為崩中暴下治當大補氣血升舉脾胃之氣微加鎮墜心火補陰瀉陽而崩自止若過涼劑投服則加遏陽氣於氣海經血愈難寧靜古人多用燒乾薑灰或燒桂心灰方書用治寒崩非治寒也取其散結從治法耳然更當分陰陽而治夫氣血人身之陰陽也陽主升陰主降陽根陰陰根陽一升一降循經而行無崩漏也若陽有餘則升者勝血出上竅陽不定則降者勝血出下竅故血隨陽氣而升降陽氣者風也風能上升然必須東方之溫風始能升生長養也婦人血崩來如潮湧明是熱勢妄行然豈可用寒治寒則血凝泣而熱鬱於中宮益深矣治宜清補兼為升提血自循經經自攝血故宜不可驟止也宜地黃阿膠芍藥麥冬桑耳灰木耳灰之類久則亦多虛寒而宜溫補脾腎者當以脈侯之然血症多兼用黑藥者以血者火之色也黑者水之象也血挾火勢令水化制之故黑能勝紅也經云陰虛陽搏謂之崩蓋尺脈既虛陰血已損寸脈搏擊虛火愈熾火迫妄行而為之崩皆從胞絡中出也血久下行已為熟經則本宮血乏十二經之血皆從此滲漏矣然胞絡下繫於腎上通於心故此症實關心腎二經宜有陰虛陽搏之脈也東垣用十二經引經之藥使血歸十二經然後用黑藥止之若不先服引血歸經則止血藏於何所勢必益增泛濫無拘矣尤宜清心絶欲則心得拱默之德腎得閉藏之司肝無妄泄之害矣崩者倏忽暴下也漏者淋瀝不斷也總由勞役過度而傷中喜怒不節而傷肝脾虛不能統血肝傷不能藏血而為崩中漏下或悲思憂恐太甚陽氣內動真陰愈虛不能鎮守胞絡相火迫血而崩故宜養血安神為主若因脾胃氣虛下陷腎與相火相合濕熱下迫而致者宜調理養血為主或大小新産遽觸房事或經水未絶欲熾而傷血海皆致崩漏並宜調氣養血於肝心脾腎則臟求之女子漏下惡血或暴崩不止多下水漿之物皆由飲食不節或勞倦傷脾或心氣不足夫脾為至陰滋榮周身者也心主血脈實腎貫脾者也二者受病病皆在脈脈者血之府也心者脈之神也心不主令包絡代之心系者胞絡命門之脈也主月事生孕因脾胃虛而心包乘之故漏下血水不止當除濕去熱用升陽除濕湯即提陽氣之下陷復假風藥以勝其濕熱之勢也若病愈經血惡物已盡必須以黃耆人參甘草當歸之類補之若經血惡物下之不絶因虛不能收攝者當益脾胃補氣血兼升兼止因於熱者兼以清心涼血之藥人之七情過極則動五志之火五志之火一甚則經血暴下如風動水搖火燃水沸也治崩次第初用止血以塞其流中用清熱涼血以澄其源末用補血以還其舊若止塞其流而不澄其源則滔天之勢不能遏若止澄其源而不復其舊則孤立之陽無以立故急則治標緩則治本本末勿遺前後罔紊方可以言治立齋曰有婦人患崩過服寒藥脾胃久虛中病未已寒病復起煩渴引飲粒米不進昏憒時作脈洪大而按之微弱此無根之火內虛寒而外假熱也十全大補加附子而崩減日服八味丸而愈又有久患崩者服四物涼血劑或作或止有主降火為治則更加腹痛手足俱冷此脾胃虛寒所致先用附子理中湯次用濟生歸脾補中益氣二湯而崩愈崩且水瀉是前後二陰之氣下脫也參苓耆朮佐升柴大升大補為佳如病人自覺寒冷如水時欲喜暖所下汙水色如屋漏或多白帶脈雖洪緊而無力或沉伏者此屬濁氣鬱滯衝任所致宜以升散開結平肝為要必兼辛散平以辛涼其純熱純寒之藥俱不可用炒黃柏蒼朮香附撫芎半夏青陳皮白芷柴胡肉桂炮薑之類最宜凡受熱而色赤者謂之陽崩受冷而色白者謂之陰崩五臟皆虛五色隨崩俱下一臟虛隨臟見色者下色白如涕肺臟之虛冷也色青如藍肝臟之虛冷也色黃如爛瓜脾臟之虛冷也色赤如絳心臟之虛冷也色黑如肝血腎臟之虛冷也五臟俱虛五色相雜謂之五崩立齋曰血崩兼心痛者心主血去血過多心無所養以致作痛也宜十全湯倍參朮多服如瘀血不行者失笑散陰血耗散者烏賊丸斂之然崩為急症漏為緩症崩必大怒傷肝衝動血海或火盛之極血熱沸騰也漏則房勞過度傷損衝任二脈氣虛不能約制經血或其人平素多火血不能安故不時漏泄崩宜理氣降火升提漏宜滋陰補氣養血或兼制火也崩漏不止之症先因心火亢甚於是血脈泛溢以致肝實而不能納血出納之用遂廢經曰子能令母實是以肝腎之相火上挾心火之勢從而相扇至令月水錯經妄行無時泛溢若不早治變為血枯發熱癆怯矣經云陽絡傷血外溢陰絡傷血內溢又云脾統血肝藏血故崩漏為患因脾胃虛損不能統血運行或因肝經有火血得熱而下流或因肝經有風血乘風而妄動或因怒動肝火血熱沸騰或因脾經鬱熱血不歸經或因悲哀太過胞絡傷而滲漏治療之法脾胃虛弱者四君子加芎歸脾胃虛陷者補中湯加白芍肝經血熱者四物湯加柴胡山梔肝經風熱者加味逍遙散若怒動肝火亦用前藥脾經鬱火者歸脾湯加山梔柴胡丹皮悲傷胞絡者四君子加升柴山梔初起多從熱久則又當從寒然陽強陰弱者崩愈久而陰愈虛愈熱乃陰虛之假熱不可用寒涼正治也朱丹溪東垣云凡下血證須四君子收功又曰氣虛血虛皆以四物加參耆因勞力者參耆加升麻若大去血後毋以脈診急用獨參湯救之其發熱潮熱咳嗽脈數乃元氣虛弱真陽不能內藏真陰不能內守假熱之脈也尤宜人參此等症候無不由脾胃先損故脈洪大察其中有胃氣受補則可救設遇寒涼復傷脾胃生氣反不能攝血歸源是速其危也蓋諸血症皆以胃藥收功蓋脾能統血而脾胃又為生化之源也至於先貴後賤名曰脫勢始富後貧命曰脫營由心氣不足其火內燔血脈之中經候不調形體容顏似不病者此心病不影於疹至於飲食不節則病矣凡此宜勸解以慰其心再以大補氣血調益脾胃微加鎮墜心火補陰瀉陽而經自調矣脈訣曰崩漏下血脈遲小虛滑者生疾急大實緊數者死尺寸虛者漏血脈浮者死不治膠艾湯治勞傷血氣衝任虛損月水過多淋漓不斷及妊娠調攝失宜治氣不安或因損動漏血傷胎阿膠炒芎藭甘草炙各二兩艾葉炒一兩當歸二兩熟地黃白芍藥各四兩每服五錢水一鍾酒半鍾煎服柏子仁湯治婦人憂思過度勞傷心經不能藏血遂致崩中下血不止鹿茸火去毛酒蒸烙香附子炒去毛柏子仁炒各二兩芎藭茯神去木當歸小草各一兩甘草炙五錢川續斷一兩阿膠二兩炒成珠每服四錢酒一鍾薑五片煎七分空心溫服一方治月水不止用阿膠炒枯為末好酒空心調服四錢或白湯亦可烏雞丸治婦人羸弱血虛有熱經水不調崩漏帶下骨蒸等疾不能成胎白毛烏骨公雞一雙重二斤半許閉死去毛腸淨艾四兩青蒿四兩銼碎納一半在雞腹用酒罈一個納雞並余艾蒿在內用童便和水灌令沒雞二寸許煮絶干取出去骨余俱搗爛如薄餅狀焙乾研為細末南香附去毛淨一斤分作四分米泔水浸一分童便浸一分醋浸一分酒浸一分春秋一夏一冬四日取出曬乾熟地黃四兩焙乾當歸酒浸洗炒白芍藥酒炒鱉甲醋浸炙黃色人參焙生地黃懷慶者勿犯鐵器白朮炒黃耆蜜炙川牛膝酒炒牡丹皮酒炒柴胡蜜酒炒知母酒炒貝母薑汁拌炒各二兩地骨皮乾薑炒黃玄胡索黃連酒浸炒各一兩秦艽一兩五錢蜜酒持炒川芎白茯苓各二兩五錢上同香附子共為細末和雞末溫酒或米飲下忌煎炒辛辣之物及莧菜芩心丸治婦人四十九歲以後天癸當住每月卻衍或過多不止黃芩新枝條者二兩以米醋浸七日炙乾又浸又炙如此七次為末醋糊丸桐子大每服七十丸空心溫酒下日三服十灰丸治崩中下血不止黃絹灰馬尾灰藕節灰艾葉灰赤松皮灰蒲黃灰蓮蓬灰油發灰棕櫚灰綿灰各等分為末醋煮糯米糊丸桐子大每服百丸米飲下備金散治婦人血崩不止香附子四兩炒當歸一兩二錢五靈脂一兩為末每服五錢空心淡醋湯調下立效丹溪云崩過多者先用五靈脂末一服當分寒熱五靈脂能行能止蓮蓬散治經血不止蓮蓬燒灰存性為末白湯調服二錢帶下門諸論經曰思想無窮所願不得意淫於外入房太甚發為白淫白淫者白物淫衍如精狀男子因溲而下女子陰中綿綿下也本出於帶脈帶者奇經八脈之一也腰臍間回身一周如束帶焉八脈俱屬腎經人身帶脈統攝一身無形之水下焦腎氣虛損帶脈漏下白為氣虛赤為有火治法但以補腎為主白者多赤者少若脾虛者六君子加升麻氣虛者補中湯肝虛者逍遙散兼六味丸帶下任脈之病也經云任脈者起於中極之下以上毛際循腹裡上關元至咽喉上順循面任脈自胞上過帶脈貫臍上其病所發正在過帶脈之分淋漓故曰帶男子遺精白濁女子赤下白淫皆因喜怒憂思産育房勞傷其榮衛或素有濕熱濁氣滲入膀胱故穢白之物如涕而下流不止面色無光腰腿痠痛精神短少世徒知下焦之虛寒不知中焦之濕熱反用燥熱溫補之劑偏助陽火陽火既盛陰血漸爍譬如豬膏烹之則融冷則凝中焦濕熱淫氣不清則為白帶所以火升水降則上熱下寒下焦虛冷凝結濁物若熱氣熏蒸則為腥腐之氣安得獨言虛寒乎法當清上實下清濁自分理脾養血濕熱自解再為溫補下元使水升火降而帶自除故丹溪曰氣屬血白屬氣屬痰俱是胃中痰積下流滲入膀胱宜用升舉肥人多屬濕痰瘦人帶病少如有者亦屬熱痰宜用星半蒼朮海石炒黃柏青黛川芎椿樹皮之屬婦人多憂思鬱怒損傷心脾肝火時發血不歸經所以多患赤白帶也白帶多是脾虛蓋肝氣鬱則脾受傷脾傷則濕土之氣下陷是脾精不守不能輸為榮血而下白滑之物矣皆由風木鬱於地中使然耳法當開提肝氣補助脾元以補中益氣湯加棗仁茯苓山藥黃柏蒼朮麥冬之類濃煎不時飲之再用六味地黃加牡蠣粉海螵蛸杜仲牛膝蜜丸如豆空心吞下五六錢白帶本屬氣虛補氣健脾兼以升舉若如濃泔而臭穢特甚者濕熱甚也宜蒼朮白朮黃柏茯苓椿樹皮之類佐以升提若如雞子清者脾腎虛極也面色必不華足脛必浮腰腿必酸宜五味子八味丸間用開脾養心之劑如歸脾湯之類陰虛有火宜八味丸中加五味子菟絲子車前黃柏叔和云崩中日久為白帶漏下多時骨水枯蓋言崩久氣血虛脫雖有寒熱之分俱是氣血流淫為病總歸屬於虛處也婦女下赤白而不甚稠者曰白淫與男子白濁同系於腎火如龍雷之攪而不澄清也屬足少陰足太陰治當清補為主如有滑白稠黏者謂之帶下屬心包手厥陰少陽即如男子自遺之精甚如砂石之淋源乎心包系乎脊絡於帶脈通於任脈下抵湧泉上至泥丸治宜血肉之劑以培之時人泥於常套作流痰治以牡蠣龍骨地榆膠艾之類治之和以四物加以升提殊不知根本損傷以致腐敗而來澀彼塞滯不清之物則益加其滯升提不正之氣則愈增其鬱惟以六龍固本丸十六味保元湯主之十六味保元湯治赤白帶下骨碎貫衆去毛三錢杜仲小茴香鹽酒炒一錢五分人參二錢黃耆一錢巴戟二錢當歸一錢石斛七分升麻七分山藥一錢生草六分獨活一錢茯苓七分蓮子一錢黃柏八分圓肉三枚六龍固本丸山藥四兩巴戟肉四兩山奈四兩川楝子二兩小茴香一兩補骨脂二兩青鹽三錢人參二兩蓮肉二兩黃耆二兩川芎一兩木瓜一兩帶脈總束諸脈使不妄行如人束帶而前重也婦人赤白帶下之症多是怒氣傷肝肝鬱乘脾則脾受傷而有濕濕而生熱熱則流通所以滑濁之物滲入膀胱而出也古人作濕寒而用辛溫治之者非丹溪作濕熱而用苦寒之藥是正治之法也用辛溫之藥是從治之法也蓋濕熱怫鬱於內肚腹疼痛赤白帶下非辛溫之藥從治而能開散之乎若在濕熱尚未怫鬱但只赤白帶下而無腹痛之症者不若暫用苦寒之藥治之為當也一方治婦人有孕白帶黃芩炒蒼朮各三錢黃連炒白芷各二錢白芍二錢五分椿根皮炒黃柏炒各一錢五分山茱萸二錢五分為末糊丸空心溫酒下五十丸白帶神方用牡蠣青色無沙眼者為雄者佳炭火煅紅在地上冷定再煅如法七次研製空心用腐漿調下二錢一二服便愈一方治赤白帶濕勝而下者滑石炒蒼朮鹽炒白芍各一兩枳殼炒甘草各三錢地榆五錢乾薑炮二錢椿根皮炒一兩為末粥丸空心米飲下百方當歸煎治赤白帶下腹內疼痛不欲飲食日漸羸瘦當歸去蘆酒浸赤芍藥牡蠣火煅取粉熟地酒浸蒸焙白芍藥續斷酒浸阿膠各一兩地榆五錢為末醋糊丸桐子大每服五十丸空心米飲下威喜丸治白帶白淫白濁便如米泔黃蠟四兩白茯苓去皮切塊四兩用豬苓一兩同煮三十餘沸取出日曬不用豬苓以茯苓末熔黃蠟丸如彈子大每服一丸空心細嚼津液咽下以小便清為度忌米醋只吃粳醋大效拱辰丸治婦人血海虛冷白帶時下臍腹刺痛久服令人延年精神充實子嗣多育琥珀二錢當歸二兩沉香五錢木香不見火三錢官桂不見火五錢人參黃耆鹿茸酥炙酸棗仁鹿角霜延胡索柏子仁各一兩乳香沒藥乾薑各五錢為末蜜丸如龍眼大每服一丸空心溫酒化下人參黃耆散治久患白帶瘦細無力腰腹腿痛飲食無味面黃浮腫小水淋漓氣虛血少當歸身茯苓各一錢芍藥炒真地骨皮白朮八分川芎人參各八分車前子五分黃耆一錢炙甘草五分熟地一錢五分鹿角膠如氣虛者入五茶匙水一鍾棗二枚煎服女科雜症門熱入血室金匱曰婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀此為熱入血室治之無犯胃氣及上二焦必自愈也此言發熱病之初也經水適來邪盛而經氣亦盛寒邪傷榮故邪與血搏血屬陰主夜故晝則雖熱而明瞭暮則入陰分邪挾陰氣而為譫語如見鬼狀者譫之甚也此為熱入血室然血室雖在內而表邪實未嘗犯胃及上二焦故治法亦惟和表邪兼清血室之熱足矣誤以為客邪入內攻之則伐及無辜導邪入內矣故曰無犯胃氣及上二焦必自愈也然沖為血海即是血室衝脈得熱則逼血下行男子亦有之不獨婦人也血分水分金匱曰病有血分水分何也經水前斷後病水名曰血分此病為難治先病水後斷經名曰水分此病易治蓋去水後斷經名曰水分此病易治蓋去水其經自下也聖濟曰血分者經水通之際因寒熱傷其衝任氣壅不行播在皮膚邪氣相搏經血分而為水發為浮腫故曰血分久不治積成水腫即難治水分者以水氣上溢皮膚散於四肢發為浮腫蓋腎者胃之關關門不利故聚水而從其類病水而經乃斷矣證治又曰經事不通血入四肢化為水遂成腫滿非獨産後為然名曰血分誤作水治其害不小宜調經散蓋氣者水之母血者氣所化非氣無法以生血非血無以養氣若經水不通則血病氣亦病豈有水不通而能化血乎血不通而化水者乃是氣壅不能化血而成水也觀桃仁丸可見矣炙臠梅核金匱曰婦人咽中有如炙臠半夏厚朴湯主之炙臠乾肉也咽中貼貼如有炙肉吐之不出吞之不下此病不因腸胃故不礙飲食二便不因表邪故無骨痛寒熱乃氣為積寒所傷不與血和血中之氣溢而浮於咽中得水濕之氣凝結難移男子亦間有之藥用半夏厚朴湯乃二陳去陳皮甘草加厚朴紫蘇生薑也專治婦人七情之氣鬱滯不散結成痰涎或如梅核在咽咯咽不下或中脘痞滿氣不舒暢或痰飲中滯嘔逆惡上並可取效蓋半夏降逆厚朴散結生薑茯苓宜至高之滯而下其濕蘇葉味辛氣香色紫性溫能入陰和血則氣與血和即不復上浮也癥瘕痃癖痃者近臍左右各有一條筋脈急痛大者如臂次者如拳因氣而成如弦之狀故名曰痃癖者僻在兩肋之間有時而痛故名曰痃癖者僻在兩肋之間有時而痛故名曰癖疝者痛也瘕者假也假物成形推移乃動也若傷食成塊堅而不移名曰食癥瘀血成塊堅牢不移名曰血癥積在腸胃之間與臟氣結搏堅牢雖推之不移名曰癥言其病形可徵驗也氣壅塞而為痞言其氣痞塞不宣暢也大抵推之不動為癥推之動為瘕也至疝與痃癖則與痛俱痛即現不痛即隱在臍左右為痃在兩肋間為癖在小腹牽引腰脅為疝總因婦人臟腑虛弱經行不忌生冷痰血飲食結聚成塊與臟氣相持日漸生長牢固不安得冷則發大痛欲死然有異於丈夫者非因産後血虛受寒或因經來取冷過度不獨飲食失節多挾血氣所成其脈弦急者生虛弱微細者危善治者調補脾胃為主佐以消導若形氣充實者調其氣而破其血消其食而豁其痰衰其大半而止不可猛攻以傷元氣病重則病受之病輕則胃氣受傷矣或云待塊消盡而後補養則胃氣之存也幾希不惟不勝治終亦不可治也乳症婦人之乳男子之腎皆性命之根也人之氣血周行無間寅時始於手太陰肺經出於雲門穴穴在乳上丑時歸於足厥陰肝經入於期門穴穴在乳下出於上入於下肺領氣肝藏血乳正居於其間也其足陽明之脈自缺盆下於乳又衝脈者起於氣街並足陽明夾臍上行至胸中而散故乳房屬足陽明胃經乳頭屬足厥陰肝經婦人不知調養有傷衝任且忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行陽明之血熱甚或為風邪所容則氣壅不散結聚乳間或硬或腫疼痛有乳核漸至皮膚焮腫寒熱往來謂之乳癰風多則硬腫色白熱多則焮腫色赤不治則血不流通氣為壅滯而與乳內津液相搏瘍化為膿治之之法凡初起寒熱焮痛即發表散邪疏風清胃速下乳汁導其壅塞則病可愈若不散而不易成膿宜用托裡若潰後肌肉不生膿水清稀宜補脾胃若膿出反痛惡寒發熱宜調榮衛若晡熱焮腫作痛宜補陰血若食少作嘔宜補胃氣切戒清涼解毒反傷脾胃也乳癰者俗呼曰吹乳吹者風也風熱結汨於乳房之間血脈凝注久而不散潰腐為膿凡忽然壅腫結核色赤數日之外焮痛脹潰稠膿湧出此屬膽胃熱毒氣血壅滯名曰乳癰為易治治法青皮疏厥陰之滯石膏清陽明之熱生草節解毒而行汙濁之血荊防散風而兼助藥達表栝蔞沒藥青桔葉角刺金銀花土貝母當歸及酒佐之毋非疏肝和血解毒而已加艾隔蒜灸二三十壯於痛處最效切忌刀針傷筋潰脈為害不小有因婦人所乳之子膈有滯痰口氣焮熱含乳而睡熱氣吹入乳房凝滯不散遂生結核若初起時忍痛揉軟吮去乳汁即可消散失此不治必成癰腫亦有因小兒斷乳後不能回化或婦人乳多嬰孩少飲積滯凝結又或經候不調逆行失道又有邪氣內郁結成癰腫初發時切勿用涼藥蓋乳本血化不能漏泄遂結實腫乳性清寒又加涼藥則陰爛宜也惟涼藥用之既破之後則佳如初發時宜用南星薑汁敷之可以內消更加草烏一味能破惡血逐塊遇冷則消遇熱則潰更加乳香沒藥以定痛內則用栝蔞仁十宣散通氣散間服之然年四十以下者治之多瘥以氣血旺故也五十以上者慎勿治之多死以天癸絶也不治自能終其天年若欲加治惟調補氣血為主婦人有憂怒抑鬱朝夕積纍脾氣消阻肝氣橫逆氣血虧損筋失榮養鬱滯與痰結成隱核不赤不痛積之漸大數年而發內潰深爛名曰乳岩以其瘡形似巖穴也慎不可治此乃七情所傷肝經氣血枯稿之證治法焮痛寒熱初起即發表散邪疏肝之中兼以補養氣血之藥如益氣養榮湯加味逍遙散之類以風藥從其性氣藥行其滯參耆歸芍補氣血烏藥木通疏積利壅柴防蘇葉表散白芷除膿通榮衛官桂行血和脈輕者多服自愈重者尚可延年若以清涼行氣破血是速其亡也前陰諸症前陰所過之脈有二一曰肝二曰督脈經曰足厥陰之脈入毛中過陰器抵少腹是肝脈所過也督脈起於小腹以下骨中央女子系廷孔循陰器男子循莖下至纂與女子相等是督脈所過也婦人陰腫者有因胞絡虛損風冷客之與血氣相搏而腫者有因鬱怒傷損肝脾者有因房勞過度濕熱下流者有欲勝而熱甚生蟲以致腫癢並作者皆宜戒房室而速治之否則邪氣漸盛陰戶潰爛不收矣若氣血虛弱補中湯舉而升之肝經濕熱龍膽瀉肝湯滲而清之肝脾鬱怒元氣下陷濕熱壅滯朝用歸脾湯加升柴解鬱結補脾氣夕用加味逍遙散清肝火生肝血除熱去濕至於陰癢陰瘡多屬蟲蝕所為始因濕熱故生三蟲在腸胃間因臟虛乃動其蟲侵蝕陰中精華故時作癢甚則癢痛不已潰爛成瘡在室女寡婦尼姑多犯之因情想不遂以致精血凝滯釀成濕熱久而不散遂成三蟲癢不可忍深入臟腑即死令人發熱惡寒與癆相似亦有房室過傷以致熱壅腫癢內痛外為便毒莫不由欲事傷損肝腎腎陰虧而肝火旺木鬱思達肝經鬱滯之火走空竅而下注為癢為蟲當用龍膽瀉肝湯逍遙散以主其內外用蛇床子煎湯熏洗專以桃仁研膏和雄黃末雞肝研餅納陰中以制其蟲若肢體倦怠陰中悶癢小便赤澀者歸脾湯加山梔白朮甘草丹皮若徒以濕熱為事燥濕清熱則氣血日衰所害不止陰癢矣婦人陰冷因勞傷子臟風冷客之若小便澀滯小腹痞痛龍膽瀉肝湯若小便澄清飲食少思大便不實治以八味丸八味丸治血弱不能榮養臟腑津液枯澀寒客子臟陰冷者甚效陰挺下脫牽引腰腹膨痛者或因胞絡傷損或因子臟虛冷或犯非理房事或因分娩用力所致當以升補元氣為主若肝脾鬱結氣虛下陷補中湯若肝火濕熱小便赤澀龍肝湯有陰中突出如菌四圍腫痛便數晡熱似癢似痛小便重墜此肝火濕熱而腫痛脾虛下陷而重墜也先以補中湯加山梔茯苓青皮以清肝火升脾氣更以加味歸脾湯調理脾郁外以生豬油和藜蘆末塗之而收新室嫁孔痛宜舒郁和血四物加香附紅花有交接出血者此肝火太旺而疏泄過度且肝虛不能藏血脾虛不能攝血也宜補中及歸脾二湯消息用之若六脈俱洪者此腎陰虛而不能閉藏也宜六味湯加麥冬五味主之金匱云胃氣下泄陰吹而正喧此穀氣即不能上升清道復不能循經下走後陰陰陽乖闢如腸交之義是也甚或簌簌有聲如後陰之失氣狀宜補中湯加五味子主之𤵄痃婦人𤵄痃或肝經濕熱下注或鬱怒傷損肝脾其候兩脅小腹腫疼或玉門焮腫作痛憎寒壯熱小便澀滯腹內急痛或小腹痞悶上攻兩脅者肝經濕熱鬱滯也龍膽瀉肝湯玉門腫脹者肝火血虛也加味逍遙散若概投散血之攻毒之劑則誤矣足跟瘡腫臁瘡婦人足跟足指腫痛足心發熱皆因胎産經行失於調攝虧損足三陰虛熱所致若腫痛或出膿用六味丸為主佐以八珍湯胃虛懶食佐以六君子湯寒熱內熱佐以逍遙散晡熱益甚頭目不清佐以補中益氣湯凡發熱脯熱內熱自汗盜汗等證皆陰虛假熱也故丹溪謂火起九泉陰虛之極也足跟乃督脈發源之所腎經所過之地諸骨承載之本若不求其屬泛用寒涼其為夭枉者多矣男子酒色過度者多患此證婦人腳十指如熱油煎者此由榮衛氣虛濕毒之氣流滯經絡上攻心則心痛下攻腳則腳痛其腳指如焚如腳氣之類經云熱厥是也婦人兩臁生瘡或胎産調理失宜傷損脾胃或憂思鬱怒虧損肝脾以致濕熱下注外臁屬足三陽易治內臁屬足三陰難痊若初起發腫赤痛屬濕熱毒所乘人參敗毒散若漫腫作痛或不腫不痛屬脾虛濕熱下注補中益氣湯或八珍湯加萆薢金銀花之類若膿水淋瀝體倦少食內熱口乾屬脾氣虛弱補中湯加茯苓酒芍若午後發熱體倦屬血虛前湯加川芎熟地或六味丸若肢體畏寒飲食少思屬脾腎虛寒十全湯八味丸色赤屬熱毒易治色黯屬虛寒難治血風瘡婦人血風瘡因肝脾二經風熱鬱火血燥所致其外症身發疙瘩癢痛不常搔破成瘡膿水淋漓內症月經無定小便不調夜熱盜汗惡寒憎熱倦怠懶食宜先用加味逍遙散或小柴胡湯合四物多加胡麻子後以歸脾湯加熟地去木香夢與鬼交夢與鬼交者因血氣虛衰思想過度神明耗損外邪乘虛而犯之其狀時笑時泣不欲見人如有對忤者是也其脈遲伏或如烏啄或綿綿而來不知度數乍大乍小乍短乍長總由七情虧損心血神無所護而然宜用安神定志等藥正氣復而神自安外以患人兩手拇指相併用線扎緊當合縫外半肉半甲之間名鬼哭穴灼艾七壯果是邪崇病者乞求免灸自去矣然人之五臟各有所藏心神肝魂肺魂脾意腎精與志也若心之血虛則神無所依肝之血虛則魂無所附脈之氣虛則魄無所歸脾腎二臟虛則意與離其體夜夢鬼邪若有所見者即我之魂魄也豈真有所謂鬼邪崇魅與之交感者哉立齋斷以七情虧損心血神無所護而然真得病情之至理矣
