body:
  text: 卷三胎產門受胎保護諸法一受胎後忌食牛肉犬兔雀肉螃蟹團魚烏魚無鱗魚胡椒花椒薑蒜辛辣之物一受胎後最忌暴怒口不可出惡言手不可用鞭撻蓋怒傷氣血多有因此動胎者即不動胎怒氣入胎子生多疾並不可看戲神儺神及怪異形像一受胎後不可登高上梯恐傾跌有損不可伸手高處取物恐傷胎而子鳴腹中子鳴但令產母鞠躬片時自安一受胎三五個月後常要緊束其身勿令胎放亦勿過緊令胎不舒一受胎七八九個月胎忽亂動三兩日間或痛或止或胞水已下腹痛不已但腰不甚痛脈未離經離經之脈一呼一吸共六至或沉細而滑也此非產也名曰弄產又有臨產一月前忽然腹痛卻又不產此是胎轉名曰試胎胎水有元俱不奶事但要直身坐臥行立不可驚憂逼迫二者俱非正產必因曲身觸犯而然經曰一息不運則機緘窮一毫不續則霄壤判所謂氣血周流循環無端少有間斷則身危矣妊娠子在腹中母子一氣流通全賴漿水滋養十月數足血氣定全形神俱備忽如夢覺自能求路而出既出胞外母子分體呼吸殊息豈可久羈於內而使氣血不運不續哉夫胎元壯健者既胞脫而隨漿即下故易產其困弱者轉頭遲慢愈慢愈乏愈乏愈遲胞漿既干汙血凝塞道路阻滯橫生逆生子死腹中母命一縷治者必須滋其榮益其氣使子母精神接續而子母運行得力兼為溫其經開其瘀使道路通暢而子力易以轉舒再得老成穩婆在外細心接取自可萬全切勿用力太早虛費精神猛劑催生反傷血氣要知產育一門全仗氣血用事無補精神之藥焉圖胎產之功徒傷氣血之和反貽產後之疾張立保產萬全湯細心周匝補接開導升降溫行產際產後備得其宜誠為萬全者矣臨產斟酌臨產時最戒用力太早脈訣云夜半覺痛應分娩來朝日午定知生由此觀之則腹痛半日後恰當產也但產之難易人各不同時亦有異有素易產有素難產者有先難後易先易後難者俱無一定如臨產腹痛不生非是難生還是子未出胎產母切勿懼怕即一日二日至三五日無妨安心定氣任其自然勉強忍痛進其飲食要坐則坐要行則行要睡則睡保養精神為第一莫聽穩婆逼迫用力太早自己亦勿求速於離身傍人亦勿多言恐懼以亂其心時至自然分娩譬如登廁未急則難時急自易此理雖俗知此免患蓋穩婆逼迫有二有不知時候逼迫者有急完此家復往他家者極誤大事一未產前幾固時辰子亦要出產戶轉身至手被母用力一逼即手先出轉身至腳母力一逼即腳先出橫生倒生皆因錯於用力其實無手足先出之理故腹痛數日而不生者不宜慌忙今人見其一日半日不產即謂難生老少驚惶求神許願產婦見之必生憂恐一有憂恐之心自然無膽氣無精力難飲食不審此非難生乃是時候未至惟宜忍痛候時若乃憫其痛甚急欲離身穩婆傍人強之用力時候未到用力太早關係母子性命胡不明理一至此哉斯時穩婆以意推度產婦以意審詳切不可輕易催迫用力必俟臍腹痛極腰間重痛眼中如火穀道迸急胞水或血懼下脈見離經或沉細滑此時子已出胎產母方用努力庶不誤事如數候未見切不可性急亂為以致神氣早疲臨產卻無精力不能運送出外並致產後多虛矣故將產宜濃煎人參湯時飲補接助之一有用力太早致令水衣先破被風所吹因而產戶腫脹乾溼狹小最令難產者只多幾個時辰從容俟之無妨又有穩婆無知害人私以手指掐破水衣者極要關防將產最戒曲身眠臥雖甚腹痛宜強為站立散步房中或免凡立切戒攣腰以助兒轉舒尋路也蓋產母畏痛不肯直身行動多愛曲腰眠臥以致胎元轉動不順兒子尋到產門被母曲腰遮閉再轉又再閉則子必無力而不能動決至難產人見其不動則謂胎死其實因無力而非死也此時恁有良方妙藥不能令子有力而動只要補接產母元氣更要心安氣和調理精神胎元勝復可保無虞又有胞水已下子忽不動停一二日三五日者有之調補氣血之外切戒驚恐憂懼暴性蓋驚則神散憂則氣結暴則氣不順血必妄行多致昏悶知此善調自然無恙一將產時須迸飲食戒喧鬧蓋進飲食則氣充膽壯免致飢渴虛乏無力戒喧鬧則神靜自安切勿煩躁靜則神藏躁則消亡也其食宜覓母雞煮汁作粳米稀粥與食不可食雞及諸肉食常令稍飢為佳蓋飢則氣下氣下則產速若多食肉食則礙於上焦氣不得下故產難產後亦令勿食過飽致生疾病一臨產腹痛而腰不甚痛產未急也須扶起直身而行若行不得則倚物而立蓋產自有時如果熟香飄瓜熟蒂落不可倉皇魯莽反致有害也痛時稍放裙帶以便兒在腹中轉舒有餘地也一臨產時凡喪孝穢濁人尼姑孤寡不潔人莫令入房致產不利惟老成解事曾經生長者二三人足矣俗忌人知多亦難產多一人入房則多一時遲延此亦當忌一產時以飲食為本有等婦人臨產不能飲食者則精氣不壯何以用力須未產前預買好人參四五錢如虛極者及向有產暈者一二兩任用待將產時煎汁一鍾聽用審是兒將來時以此服之大助精力勝於肉食百倍產後人參不可亂投若果系虛症必兼溫暖藥用如黑乾薑之類如一產後以人參五錢當歸二錢煎湯衝入童便產下即服元補諸虛兼卻產後百病張常用於極虛之人產後猶如未產之健旺一產後漸進玉米飲取糠氣能降虛火也白粥宜極稀以漸調理為上三朝內不可食葷及雞子及黏硬之物六七日上胃強者可少與母雞牛肉鯽魚作清羹少少食之一將產救生法凡手先出名曰橫生足先出名曰倒生相傳手出者曰覓鹽生此亦有理人未講明蓋鹽主收斂緊縮又醃螫肌肉疼痛兒手得鹽且痛且縮自然轉身順下覓鹽之名本於此也其治法如手足先出者急令產母仰臥略以鹽塗兒手心足心仍以香油抹之輕輕送入即便自轉順生不可任其久出久則手足青而子傷難以送入亦不可妄用催生方藥蓋手足之出非藥可治又切勿誤聽凶婦用力斷手一斷子必腹中亂攪而傷母矣屢見死胎人不慌忙逼迫亦遲遲生下而不傷母夫死胎亦生者何也蓋人腹中極熱食物則入內俱化其胎雖死人不忙迫產母安心飲食腹內熱氣熏蒸胎自柔軟腐化亦生而不傷母但所出穢氣令人難聞可見死胎不必用力況活胎乎屢見無知穩婆輕令用力動傷兩命特此諄諄又見有怪胎人不驚慌亦自然生下但勿令產母知之又產母危急時當看面舌面以候母舌以候子面青母傷舌青子傷面赤舌青子死母活面舌俱赤子母無恙面舌俱青口中吐沫者子母難保張秘授一方專救難產及死胎交骨不開神驗用廣猴血錢余酒化服下立產一將產救生手法如門戶俱正兒亦露頂而不下此必因兒轉身肚帶攀其肩也名曰礙產治法令母仰臥輕輕推兒向上以手中指按兒肩去其肚帶候兒順正用力送下又有生路未正被母用力一逼令兒偏柱左右腿畔兒頭在產戶不下但云兒已露頂非頂也乃額角也名曰偏產治法亦令產母仰臥輕輕推兒近上以手扶其額頂端正用力一逼即下又有頭之後骨偏柱穀道兒乃露頂名曰棖後治法以綿衣裹手急於穀道外傍輕輕推兒頭令正然後用力一逼即下或用膝頭令產母抵住亦可三產之難皆母曲腰眠臥用力太早致之三手之法非歷練有分曉穩婆不可輕易一子出戶時人即以兩手抱產母胸前產母亦自以手緊抱肚腹令胎衣下墜如胎衣來遲切勿慌忙以草紙燒煙燻鼻即下再遲則急斷臍帶洗兒仍用軟帛物系墜臍帶系時尤宜輕巧牢固然後截斷此帶極脆若不便斷臍帶恐血反潮入胞中脹而不下攻心則傷如穩婆諸事者能以手指取下甚便有產母胎衣久不下一方用黑牛糞略焙帶潤以布裹之束於腹上即下一恚音悶臍生相傳有呼父乳名手拍兒股者此理亦未講明蓋兒糞門有一膜悶住兒氣故不能出聲拍之則膜破而能叫哭如拍之猶不破須用女人輕巧者以銀簪腳輕輕挑破甚便或不能挑急用暖衣緊包勿令散放以熱水浸其胞衣寒天則加火熱之久則熱氣內鼓其膜自破膜破則出聲而蘇矣一婦人有盤腸生者未產腸先盤出其治法急將淨盆一溫水冬則熱水入香油養潤侍兒並胞衣俱下產母吸氣上升穩婆香油塗手徐徐送入有醋水噴面令產婦驚寒氣提雖可收腸常多誤事不可用也又有兒並胞衣下後膀胱即尿胞壅出產戶者同前法送入此皆用力太早內臟動搖之故送入後宜服安臟調補藥薛立齋曰欲產時覺腹內轉動即當正身仰臥待兒轉身向下其時作痛試捏產母手中指中節或本節跳動方臨盆即產或未產而水頻下此胞衣已破血水先干必有逆生難產之患若胞衣破不得分娩用保生無憂散以固其血如血已耗損八珍湯加益母草濃煎時飲之凡孕婦止腹痛未產也連腰痛者將產也腎候於腰胞系於腎故也凡孕有生息不順宜囑穩婆只說未產或遇雙胎只說胞衣恐驚則氣散愈難生息大抵難產多患鬱悶安佚富貴之家治法雖云胎前順氣產後補血不可專執若脾胃不實氣血不充宜預調補之凍產者冬月天冷產母經血得冷則凝致兒不能下此害最深故冬月產者下部不可脫去綿衣並不可坐臥寒處務使滿房闈爐常有暖氣令產母背身向火臍下腿膝間常暖血得熱則行兒易生也熱產者盛夏產婦要溫涼得所不可過涼反增疾病不可人多熱氣逼襲令產母心煩熱血沸騰有鬱冒沖暈之患難產七因一因安逸蓋婦人懷胎血以養之氣以護之宜常時行動令氣血周流胞胎活動如久坐久臥以致氣不運行血不流順胎亦沉滯不活動故令難產常見田野勞苦之婦忽然途中腹痛立便生產可知二因奉養蓋胎之肥瘦氣通於母母之所嗜胎之所養如恣食厚味不知減節故致胎肥而難產常見糟糠之婦容易生產可知三因淫欲蓋古者婦人懷孕即居側室不共夫寢以淫欲最所當禁蓋胎系胞中全賴氣血養育靜則神藏若情欲一動氣血隨耗火擾於中血氣沸騰三月以前犯之一則易動胎小產三月以後犯之一則胞衣太厚而難產一則胎元漏泄子多肥白而不壽瘡毒痘毒疾厄難醫且人與物均稟氣以生然人之生子不能胎胎順個個存而馬牛犬豕胎胎俱易個個無損何也馬牛犬豕一受胎後則牝牡絕不與交而人受妊不能禁絕矧有縱而無度者乎四因憂疑今人求子之心雖切保胎之計甚疏或問卜禱神或聞適有產變者常懷憂懼心懸氣怯產亦艱難五因軟怯如少婦初產者神氣怯弱子戶未舒更腰曲不伸展轉傾側兒不得出又中年婦人生育既多氣血虛少生亦艱難六因倉皇有等愚蠢穩婆不審正產弄產但見腹痛遽令努力產婦無主只得聽從以致橫生倒生子母有傷皆因倉皇之失七因虛乏娠婦當產時兒未欲出用力太早及兒欲出母力已乏令兒停住因而產戶乾澀產亦艱難此可以補血催生湯用之如保產萬全湯最妙預免難產婦人孕子如雞覆卵相似雛在卵殼中臨出雛乃自家破卵殼而出兒在胞胎中臨生乃兒自吮開胞衣而生其有艱難延久者多為胞衣太厚胎氣肥大故也如孕子者勿過安逸勿厚奉養勿多淫欲自然胞衣不厚胎氣不肥產自不難且於子嗣有益婦人以血為主惟氣順則血和胎安則產順今富貴之家過於安逸以致氣滯而胎不轉過多交合使精血聚於胞中皆致難產也生化湯主之有產累日不下服催生藥不驗此必坐草太早心懼而氣結不行也經云恐則氣下恐則精怯怯則上焦閉閉則氣還還則下焦脹氣乃不行宜溫補氣血壯而行之胞漿先破惡水來多胎幹不得下先與四物佐以四君補養氣血次煎濃蔥湯令穩婆洗產戶使氣上下通暢更用酥油滑石塗產門次服催生保產萬全湯難產有因母氣盛胎肥而難產者有因母氣弱血枯而難產者悉是平時不善調攝或七八月而犯房室致汙濁凝滯不得順生大法以順氣和血為主如漿幹不下者滋潤為主汙血阻滯者逐瘀為主加坐草用力太早胞水乾者滑胎散神應散連進大劑如魚得水自順矣難產治法或開滑子宮或通調上下之氣或滋養氣血當隨機應變若胎死腹中惟有下法平胃散加朴硝以下穢水如肢體倦怠急以四君四物加薑桂調補之更宜去川芎加牛膝紅花益母尤妙立齋曰交骨不開產門不閉子宮不收三證皆由元氣素弱胎前缺於調理致氣血不能運用而然交骨不開者陰血虛也佛手散加發灰龜板產門不閉者氣血虛也十全大補湯加五味子收之子宮不閉者補中益氣加醋炒白芍五味如初產腫脹痛而不閉者加味逍遙散若腫既消而不閉者補中湯加半夏茯苓以健脾使元氣復而諸疾自愈切忌寒涼之劑又曰交骨不開者陰氣虛也龜為至陰板則交錯相解故用之又有開骨膏明乳香一兩五月五日研細豬血為丸如雞豆大硃砂為衣加味佛手散送下單養賢曰產後見此三證總服生化湯如交骨不開加龜板一枚生化湯者芎歸桃仁黑薑炙草善化惡血驟生新血而得名為產後聖藥經疏云臨產交骨不開惟濃者梓木枝湯飲之自開梓木俗名一葉一刺其木枝幹直上每一葉下必發一刺者是也盤腸生是母氣血虛弱因而下脫當用補氣血之藥兼以升提則腸自收大劑參耆歸芎加升麻主之有以醋水噴面使婦人驚寒則氣提而腸縮恐驚則氣散寒則血凝愈難收而致病矣不若皂角末吹鼻嚏作自上也偅生者言欲產時兒頭至產門方服藥催之或經日久產母困倦難生宜服藥以助血氣令兒速生也大法滑以通滯澀苦以驅逐閉塞溫以調幔諸經香以開竅逐血胞漿先破氣滯血乾者滋補精血以行之然婦人氣弱無力或日久困倦而不能送子出產門者須倍服人參此藥能兼治橫生倒產催生保生之第一藥也錦囊催生保產萬全湯方論臨產幾個時辰實存亡危迫關係母子性命故古人立方甚多然婦人胎產乃大傷氣血之端難產之因半由氣血不足產後諸疾全是氣血大虧產後諸虛皆屬產前所致奈佛手散兔腦丸及葵花益母諸方無非活血順氣滑胎破瘀溫暖通竅以圖運行推出之勢全不管運行推出之源產婦精力充足者藉此開導得以易生倘系氣血不足則雖有催生開導之功而無運行藥勢之力抑何補哉至於手握石燕足貼蓖麻設遇實症順症假此安心候時如當氣血精神虧極用此敷衍之方神氣內竭勢似隔靴搔癢不調氣血而強用催生何以為運行之具徒存虛名而無實效誤人性命於頃刻豈不痛哉惟達生散立方平正奈只可調理於產前生化湯用意甚深又只可調理於產後並非可濟危急催生之用者今體二方之意合成一方務取萬全屢用甚驗即名保產萬全湯鄙見以調補氣血為先以溫中散瘀下降為佐氣血得力自能健運催生此不催之催也故用人參當歸為君培補氣血壯其主也少加桃仁川芎黑薑炙草酒紅花溫中而散其瘀滯也牛膝梢桂心溫行導下使無上逆衝心之患不惟催生神效產後更元瘀血凝滯百病補而兼溫則不滯溫而兼補則不崩升少降多則氣得實而易下陰而兼升則瘀自去而新自歸補多瀉少邪去而元氣無傷苦少甘多瘀逐而中和仍在張以濟生念切敬立是方幸高明鑑諸人參三錢至五錢大補元氣以為君當歸去蘆三錢又補榮血以為臣川芎一錢入肝以疏鬱滯少瀉升提之性則降下之藥得力桃仁十三粒不去皮尖搗碎取苦可去舊甘能生新滑能潤下乾薑炒焦黃三錢溫能通行血分焦則令其下降而遏其上升也甘草炙六分令其里性少緩中宮得受補益不使即為下墜也牛膝梢二錢既能下行復走十二經絡令其經絡無壅則氣血效力以為運行推出之勢紅花酒炒三分多則破血少則活血生新耳肉桂臨煎方去皮切碎六分冬天用八分藉此引經率領諸藥直入血且為散瘀則生產自易而溫可通行也加膠棗一枚水煎食前溫服如產婦壯實及無力服人參者去參用之其效尚倍於佛手散多矣產後門產後脈論叔和曰產後寸口洪疾不調者死沉微附骨不絕者生又曰沉小滑者生實大堅弦急者死丹溪曰胎前脈當洪數既產而脈仍洪數者死又曰胎前脈細小產後脈洪大者多死產經曰胎前之病其脈貴實產後之病其脈貴虛胎前則順氣安胎產後則補虛消瘀此其要也臨產氣血動盪胞胎迸裂與常經離異必有水先下俗謂之胞漿即養胎之液也水下則胞裂而產既產則氣血兩虛脈宜緩滑緩則舒徐不因氣奪而急促滑則流利不因血去而枯澀均吉兆也若實大弦牢非產後氣血兩虛所宜實為邪實大為邪進弦為陰斂宣布不能牢為堅著近於無胃皆相逆之脈也產後當知凡產畢飲熱童便一盞不得便臥宜閉目而坐須臾上床宜仰坐不宜側坐宜豎膝不宜伸足高倚床頭厚鋪裀褥遮圍四壁使無孔隙免致賊風以醋塗鼻或用醋炭更燒漆器輕輕以手從心按摩至臍則惡露盡下以杜血滑血逆如此三日不問腹痛不痛以童便和酒溫服五七次酒雖行血能下惡露行乳汁然臟氣方虛不可多飲並不可產畢即飲恐引血入四肢能令血暈如胃氣弱者里無火者童便亦宜禁之恐傷胃氣惟頻食白朮薄粥漸進豐肉豬蹄少許慎言語戒七情勿勤梳頭洗足以百日為度若氣血弱者不計月旦否則患手足腰腿疼痛等症名曰蓐勞最難治療產後不必問是男是女恐因言語而泄氣或因愛憎而勞神最忌大喜大怒喜則氣散或生紅汙怒則氣逆或生癥瘕不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須氣血平復方可治事犯時微若秋毫成病重如山嶽可不慎歟乳乃血氣所成產後不可食鹽鹽止血令無乳汁且發嗽難治夏忌貪涼用扇及食冷物切不可當風睡臥兒生三日相傳洗三謂不洗則長大皮粗起秕但夏月天熱洗可不洗可至冬後切不可洗恐風入臍中臍風由此而起屢見有不洗三者至老不聞皮粗起秕有識者不洗三可也且兒在胎從母腹中溫暖長養一出胎來陽和之氣全失雖當暑月必須衣服周密勿見外風故俗云亞無六月兒生下欲斷臍帶必以蘄艾為捻香油浸濕熏燒臍帶令焦方斷其束臍須用軟帛厚綿裹束勿令受風及兒尿濕臍此預防臍風第二要緊也兒初生皮膚嬌嫩腠理不密衣服須用大人故綿則勿耗損脈絡精華兼用布衣粗服令其皮膚堅厚一生受益無窮兒生次日即看口中上齶如有白泡子即以銀挖宜輕輕刮破其泡子須刮出勿令落入喉中仍以京墨搽之此泡一老非為難刮且兒不乳變生撮口諸症又看牙齦之上如有馬牙亦須挑破取出血出不妨以墨搽之其藏胎衣忌太歲方三殺方宜用稍大平穩瓷瓶器小令兒吐乳安穩令兒不驚母血衣不可日曬兒濕衣不可夜露遇鳥以糞水染衣能生毒瘡變成疳症古以一月為小滿月兩月為大滿月此兩月內不暴怒少勞碌禁淫欲終身無病而且多子凡人累劫重修方得人身一出胞胎性命托於父母之保養有因兒女太多衣食缺乏投溺水中者大損天和最宜禁戒產後諸證不可概服補藥恐有瘀血凝滯也非行血則邪不去即諸虛症亦須血行其氣乃復但行之有方不可過峻凡產後危證莫如三沖三急三沖者敗血沖肺衝心沖胃也三急者新生產之嘔吐泄瀉多汗也其用藥則有三禁禁佛手散以川芎辛散能發汗走泄也禁四物湯以生地寒冷能作瀉而凝血也白芍酸寒伐生氣也禁小柴胡湯以黃芩性涼能阻惡露也更有三禁不可汗不可下不可利小便並勿犯胃及上下焦雖有雜症以未治之大補氣血為主產後滿百日方可會合不爾至死大概虛羸百疾多從此而得凡婦人患風氣臍下虛冷莫不由於早行房也產後諸疾古方多用四物湯加減而丹溪獨謂芍藥酸寒伐生髮之氣禁而不用何歟蓋新產之婦血氣俱虛但存秋冬肅殺之氣而無春夏主發之機故最忌寒涼大宜溫熱之藥以助資始資生之源也先哲制四物湯以芎歸之辛溫佐以地芍之寒溫寒適中為女科諸疾妙劑若用於產後必取白芍以酒重複制炒去其酸寒之性但存生血活血之能或再加黑姜則何不可用且芍藥性清微酸而收最宜於陰氣散失之證豈不為產後要藥先賢尚諄諄告戒況寒涼酸削者乎但知芍藥酸寒而不究生地更涼且直走血分為害尤甚必不得已當以熟地代之若概以四物治產後者誤人多矣產後以去敗血為先血滯不快乃成諸病夫產後元氣既虧運行失度不免瘀血停留治者必先逐瘀瘀消方可行補此第一義也但虛極不能姑待者則以峻補之中加入溫行之藥峻補則力大而可宣通溫行則流暢而不凝滯即實症逐瘀亦不可用峻厲之藥產後元氣大虛恐血無主宰一任藥力便為崩行不止虛則易脫猶覆水難收矣故莫若生化湯行中有補補中有行溫則不滯無傷胃氣為至當也產後元氣大脫新血未生凡有頭疼發熱噁心飽悶諸證皆是虛中變現之假象慨以大補氣血為主如惡露未盡補藥中入行血藥如感冒風寒停滯亦須補中兼以發散消導勿得泛用峻厲有傷氣血因疑似之外邪傷真切之元氣豈不誤甚新產之後雖無疾病宜將息勞動調理脾胃進以美味飲食則臟腑易於平復氣血自然和調百疾不生但中氣方虛難於運化勿得過多反傷脾胃四物生地性涼而滯大傷脾胃芍藥味酸而寒易伐生氣產後常多誤人生化湯除此二味加以溫中行血之劑如產後兒枕作痛世多用消塊散血之劑然後議補又有消與補混施不知舊血雖當消化新血亦當生養若專攻舊則新血轉傷世以回生丹攻血塊下胞衣其元氣甚多傷損生化湯因藥性功用而立名也產後血塊當消而新血亦當生也專消則新血不生專生則舊血反滯芎歸桃仁三味善去舊血驟生新血佐以黑薑炙草引三味入於肺肝生血利氣行中有補且得暖則血自流通惡露自盡故無後患實產後之聖藥張因其方加人參桂牛膝紅花更為產前催生之神效胞衣不下有二有因惡露入衣脹而不能出有因元氣虧損虛而不能出惡露流入衣中者腹必脹痛用奪命丹或失笑散以消瘀血緩則不救元氣虛弱不能送下者腹中不脹痛用保生無憂散以固元氣然不若總以萬全湯去人參並可取效為至當也婦人百病莫重於生產產科之難臨產莫重於催生既生莫重於胞衣不下古方用花蕊石散最為緊要但恐石藥非腸胃大虛者所宜莫若生化萬全二方選而用之有川佛手散加紅花益母草香附山楂陳皮牛膝稍煎成沖重便服更有一法產訖胞衣不下停久非特產母疲倦又恐血流胞中必致危篤宜急斷臍帶以物系墜使血不潮入胞中則胞衣自痿縮而下只要產母安心以物系墜之時尤宜用心先系然後截斷不爾胞上掩心而死慎之產後雜症門產後血暈產後血暈由產前素虛產時亡血過多以致虛火泛上身無所主以致昏暈張按大病大虛之症皆有之名為血暈實非因血而致暈也方書盡曰敗血流入肝經眼生黑花頭目旋暈不能起坐昏悶不省人事謂之血暈此血熱乘虛逆上湊心故昏迷不省氣閉欲絕也服童子便最好此論但照管敗血全不照管大虛但云氣閉欲絕服童便豈童便可挽回元氣欲絕乎一方用當歸二錢益母草一錢人參二錢紅花六分黑姜八分沖熱童便服此方兼得之矣張每遇產婦向有血暈之症者於將產數日預服十全歸脾養榮調補氣血臨產人參一二兩煎服補於未產未虛之前產後無虛可乘無暈可發矣婦人分娩昏冒瞑目因陰血暴亡心神失養心與包絡君火相火也得血則安亡血則危火上熾故令人昏冒火乘肺故瞑目不省人事是陰血暴亡不能鎮撫也經云病氣不足宜補不宜瀉瞑目閤眼病悉屬陰暴去有形之血則火上熾但補其血則神自安心得血則能養而神不昏迷矣然甚者更當以補氣藥兼之恐勢急而補陰不及且氣能生血也下血多而暈名為血脫當大劑人參可以回陽若下血少而暈非血滯或屬血竭滯者溫而行之竭者濁而補之切勿以破血行血妄投也產後血暈宜輕輕扶坐燒炭沃醋或燒舊漆器令煙入口鼻即蘇急捏人中靜以待之元氣漸復不可亂動益令神氣散亂矣惡露不下惡露不下由產後臟腑勞傷氣血虛損或胞絡挾於宿冷或當風取涼風冷乘虛而搏於血壅滯不宣積蓄在內故不下也宜溫暖活血則血自行更有服燥血枯不能宣滯者惟為溫補氣血自通也不可攻之反增別病惡露不絕產後惡露不絕由產時傷其經血虛損不足不能收斂或惡血不盡則好血難安或陰虛內熱熱搏血分或挾於宿冷致氣血不調並宜脈候參詳虛極者但溫補生新而瘀自化虛不甚者則為去瘀生新可也產後惡露不絕若肝氣熱不能生血六味丸若肝氣虛不能藏血逍遙散若脾氣虛不能攝血六君子湯胃氣下陷不能統血補中湯若脾經鬱熱血不歸源加味歸脾湯若肝經怒火榮血妄行加味四物湯若氣血兩虛十全大補湯若肝經風邪其血沸騰一味防風丸若淫欲怒氣有傷衝任血久不止者六味地黃湯加阿膠麥冬五味子產後頭痛頭者諸陽之會也產後五臟皆虛胃氣虧弱飲食不充而虛陽失守上湊於頭陽實陰虛則令頭痛間有敗血頭痛者總濁氣在上也雖有身熱惡寒之候只宜生化湯加減慎不可用羌獨等藥蓋此由真陽虧損濁陰得以犯上陷入髓海為脹為痛是非清陽升復則濁陰不降在裡內起之邪為病非若外入之邪可表而愈也產後心痛產後心痛為陰血虧損隨火上衝心絡名曰心包絡痛宜歸脾湯主之若寒傷心經名曰真心痛則無藥可救矣凡產後寒氣上攻則心痛下攻則腹痛兼血塊者宜服生化湯加桂若獨用熱藥攻寒其痛雖止而血妄行反虛產母況寒者必挾虛而燥熱者必佐陰藥方能制其僭越也產後腹痛產後惡血或因外感六淫內傷七情致令斬然而止瘀血壅滯所下不盡故令腹痛當審因治也如產婦期數內或飲食如常忽作腹痛六脈沉伏四肢厥冷此惡血不盡傷食裹血而脈不起也不可誤認為氣血兩虛而用大補須兼消導行血之藥要略曰產後腹中㽲痛當歸生薑羊肉湯主之病痛者緩緩痛也屬客寒相阻故以當歸通血分之滯生薑行氣分之寒君以羊肉者所謂形不足補以味況羊肉又能補氣㽲痛屬氣弱故宜之寇氏曰婦人產當寒月寒氣入產門臍下脹滿手不得犯此寒疝也宜仲景羊肉湯或產後臍腹忽痛乃呼吸之間冷風乘虛而入宜當歸建中湯四順理中湯產後腹痛惡露既去而仍痛四神調補之不應八珍湯若痛而噁心或欲作嘔六君子湯若痛而泄瀉六君子湯送四神丸若胸膈飽悶或惡食吞酸或腹痛手不可按此是飲食所傷用二陳加白朮山楂消導之若食既消而仍痛按之不痛更加頭痛煩熱作渴惡寒欲嘔等症此是中氣被傷宜溫補脾胃為主若發熱腹痛按之痛甚不惡食吞酸此是瘀血停滯失笑散消之若只發熱頭痛腹痛按之卻不痛此是血虛用四物加炮薑參術以補之產後小腹痛產後小腹痛由惡露凝結或外寒搏之久而不散必成血瘕月水不調然有腎陽腎陰不足者並宜按脈別治兒枕痛者兒在胎中宿有血塊產時其血破敗與兒俱下則無是患矣若產婦臟腑風冷則血凝小腹結聚疼痛右曰兒枕痛宜芎歸益母山楂香附陳皮煎服甚者加炒五靈脂或六味加益母草炒黑乾薑煎服尤佳凡兒在胎食母之血十月滿足余血成塊俗呼為兒枕有產時血塊中動敗血裹其子則令難產也有產婦小腹作痛服行氣破血藥不效其脈洪數此瘀血內潰成膿也是因營衛不調瘀血停滯宜急治之緩則腐化為膿最難治療若流注關節則患骨疽失治多為敗證脈數而洪已有膿遲緊乃瘀血也下之愈若腹脹大轉側作水聲或膿從臍出或從大便出宜蠟礬丸太乙膏下膿而愈產後腰痛產後惡露方行忽斷絕不來腰中重痛下注兩股痛如錐刺入骨此血滯經絡不即通之必作癰疽宜桃仁湯五香連翹湯產後腰痛者腎為胞胎所繫產則勞傷腎氣損動胞絡虛未平復風冷客之冷氣乘腰故令腰痛或寒冷邪氣連滯背脊痛久未已後忽有娠必致損動蓋胞絡屬腎腎主腰故也產後脅痛產後脅痛若肝經血瘀玄胡索散若肝經氣虛四君子加柴胡薄桂若肝經血虛四物加參朮柴胡若月水不足下能生肝六味丸若肺金勢盛剋制肝木瀉白散然若不用薑桂辛溫助脾肺以行藥力不惟無以施力反助其脹矣產後積聚瘕疝產後積聚瘕疝多屬氣血為風冷所搏而成積者陰氣也五臟所生聚者陽氣也六腑所成陰性沉伏故痛不離其部陽性浮動故痛無常處瘕者假也謂其痛浮假成形無定處也皆由產後氣血虛弱風冷所乘搏於臟腑與血氣相結而成也若不急治多成積結妨害月水有產婦腹中一物時痛不止以為血瘕用行血破氣藥兩脅肚腹尤甚肢節間各結小核隱於肉裡以為鱉子治亦不效殊不知肝血而養諸筋何處之骨不屬於腎何處之筋不屬於肝此肝血虛損筋涸而攣結耳養其脾土補水以滋肝血則筋自舒八珍湯逍遙散歸脾湯加減治之甚者溫補腎元則真陽得而氣行乃健何有假物成形之患真陰得而血分不枯自無筋攣脅痛之虞矣產後嘔吐產後嘔吐因飲食過多者六君子加楂曲兼勞役者補中湯飲食停滯者人參養胃湯脾胃氣虛者六君子胃氣虛寒者加炮姜煨木香寒水侮土者益黃散肝木侮土者六君子加升柴命門火衰不能升土者八味丸嘔吐泄瀉手足俱冷肚腹作痛者乃陽氣虛寒也急用附子理中湯產後呃逆產後呃逆屬脾虛聚冷胃中伏寒也夫肺主氣五臟六腑俱稟之產後氣血並傷臟腑皆損風冷搏於氣則氣逆上又脾虛聚冷胃中伏寒因食熱物冷熱之氣相為衝擊使氣逆不順則為呃逆脾主中焦為三焦之關五臟之倉稟若陰陽氣虛使榮衛之氣厥逆致生斯病經云呃噫者胃寒所生然亦有中氣大虛下焦陰火上衝而致者當用桂附乾薑之類產後氣喘產後氣急喘促者因產所下過多榮血暴竭衛氣無主不能百達運行獨聚肺中故令喘也此名孤陽絕陰為難治惟大進參附或可得生產後發喘氣促此第一危症也若作痰火實症治之必死當以人參生化湯加減人疑參能助喘不用致不救者多矣況同穹歸黑姜萬無有失要知人生於氣氣壯則根本固而藏源者斂納於下運行者強健於中何有為喘為脹之虞只有虛弱而致死未有強壯而成病也有用人參加陳皮監製則盜泄元氣反致耗散只可消導藥中兼產後浮腫產後四肢浮腫由敗血乘虛停積而循經流入四肢留淫日深腐壞如水故令面黃四肢浮腫醫人不識便作水氣治之多用導水凡治水藥極能虛人產後既虛藥又虛之是謂重虛多致夭枉服小調經散血行腫消即愈產後浮腫若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中湯若兼喘咳而脈沉細無力此命問火衰脾土虛寒也八味丸主之腹滿者虛氣而非血也補中湯送八味丸一以升補清陽一以斂納濁氣升降既得而脹滿自消矣產後手足身痛產後身痛者是血虛而不能榮也手足走痛者是氣血不能養榮四末而濁氣流於四肢則腫陰火遊行四旁則痛也不出榮養如黑姜主之產後發熱產後傷寒不可輕易發汗產時有傷力發熱有去血過多發熱有惡露不去發熱有三日蒸乳發熱有早起勞動飲食停滯發熱狀類傷寒要在仔細詳辨切不可孟浪發汗猶覆水難收也產後大血空虛汗之重則亡陽輕則筋惕肉瞤或鬱冒昏迷或搐溺便秘變症百出凡有發熱多因血虛陽無所依浮散於外而為熱宜於四物為君去川穹生地換熟地加軟苗柴胡人參炮姜最效蓋炮姜辛熱而兼苦鹹以火而治火收其浮熱且能引血藥入血分氣藥入氣分更能去惡生新有陽生陰長之道以熱治熱深合內經之旨正氣得力外邪自散矣養癸曰如胎前原有陰虛火症產後去血過多必大發熱煩躁汗出等症若依前法大補氣血其證必甚當用逍遙散以清肝火養肝血因去血既多肝虛血燥之故不可泥於氣血兩虛此以陰虛發熱立論當以脈候參詳薛立齋曰新產婦人陰血暴亡陽無所附而外熱也宜四物加炮姜補陰以配陽若誤服寒涼克削之劑而外熱者此為寒氣格陽於外也宜四君子加薑桂不應急加附子若肌膚髮熱面赤大渴引飲者此血脫髮燥也當歸補血湯又日產後虛煩發熱乃陽隨陰散氣血俱虛故惡寒發熱若誤作火證投以涼劑禍在反掌產後傷食發熱節齋曰產後脾胃大虛多有飲食過度傷滯發熱者誤作血虛則不效故遇產後發熱須問若何飲食有無傷積飽悶惡食泄瀉等證只作傷食治之若發熱而飲食調者方用補血正法但節齋所論僅言候而不言脈且僅言傷食標症之實而不論產後氣血之虛故立齋曰前證若胸膈飽悶暖腐惡食吞酸吐瀉發熱此為飲食停滯宜四君子加厚朴楂曲若胸膈悶滿食少發熱或食難消化此脾氣虛弱宜四君子加炮姜若用峻厲之劑復傷元氣則誤矣產後虛汗產後亡血多汗陰陽兩虛極危症也經曰陽氣者精則養神柔剛養筋產後既亡血而又汗多乃為亡陽蓋汗本血液屬陰陰亡陽亦隨之而走故曰亡陽其用藥與他證不同輕則參耆白朮麻黃根防風桂枝重則參附產後頭汗鬱冒金醫曰產婦鬱冒其脈微弱但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復然產婦鬱冒虛多邪少故脈微弱中氣虛也一身之陰陽不和故身無汗但頭汗出者何也血虛下厥則下之陰氣盡而陽為孤陽則上出而頭汗矣仍喜其汗出而解者何產婦血去過多而亡陰自陰較之陽為獨盛所以喜其汗損陽就陰則陰陽平故曰乃復產後中風產後中風由產時傷動血氣勞損臟腑未曾平復早起勞動致氣虛而風邪乘之冷氣客於皮膚經絡疼痹羸乏不任少氣凡筋脈挾寒則攣急喎僻挾溫則縱緩虛弱若入諸臟恍惚驚悸隨其所傷臟腑經絡而生病焉然大全曰婦人以榮血為主因產血下太多氣無所主唇青肉冷汗出目眩神昏命在須臾此虛極生風也若以風藥治之則誤矣不問何候大與溫補十全大補湯加附子令人推正其身一人夾正其面挖開口灌之如不得下令側其面出之仍灌熱者又冷又灌數次即能下少傾蘇此立齋法也產後痙病產後血虛角弓反張病名曰痙痙者勁也陰氣暴虛陰虛內熱熱極生風故外現如風假症實陰血不足無以養筋所致厥陰大虛之候宜益陰補血血長而虛風自滅也產後口噤產後中風口噤是血氣虛而風入頷頰口之筋也於三陽之筋結於頷產前勞損臟腑傷於筋脈風乘之則三陽之筋脈偏虛得風冷則急故冷口噤更有心氣虛極不能為語而口噤者惟有峻補之中兼以通調心氣之藥產後角弓反張產後角弓反張者因氣血耗損腠理不密汗出過多神無所主筋骨失養而有此虛象也乃氣血虛極宜大劑參桂耆朮歸地溫養之不應再加附子倍人參名參附湯猶未應乃藥力未到宜多用之產後瘛瘲瘛者筋脈拘急也瘲者筋脈弛縱也經云肝主筋藏血肝氣為陽為火肝血為陰為水去血過多陽火熾盛筋無所養而然用八珍湯加丹皮鉤藤以生陰血則陽火退而諸證愈不應用四君子芎歸丹皮鉤藤補脾土蓋血生於至陰至陰者脾土也且氣有生血之功耳故小兒吐瀉之後脾胃虧損亦多患之乃虛象也若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象惟當固本為善若無力抽搐戴眼反折汗出如珠者不治產後驚悸產後驚悸者由臟虛心氣不足陰虛邪熱乘心以致驚不自安悸動不定目睛不轉而不能動診其脈動而弱者驚悸也惟宜養血佐以安神血生則神有所依也產後發狂產後發狂者此陰血暴崩肝虛火炎之極也宜澤蘭歸地牛膝茯神遠志棗仁加童便主之若因敗血停滯用調經散若因心血虛損用柏子仁散若因腎虛陰火上迫而為如狂者宜八味湯加減服之要知產後大虛而繼諸病則當以虛為本而病為標也產後口鼻黑衄書以產後口鼻黑氣及見鼻衄為不可治者何也蓋五臟之華皆上注於面見色紅赤者陽熱之生氣也青黑者陰寒之絕氣也況口鼻為陽明多血多氣之部而見陰寒慘殺之氣則胃中陽和之氣衰敗可知矣復至鼻衄則陽亡陰走也胃絕肺敗陰陽兩亡故不可治及產後舌紫黑者為血先死不治蓋心主血少陰氣絕則血不上陰耳產後咳嗽產後咳嗽悉屬胃氣不足胃為五臟之本胃氣一虛五臟失所百病生焉雖謂肺主皮毛腠理不密所致不知肺屬辛金生於已土亦因土虛不能生金所以腠理不密外邪易感其陰火上炎者宜壯土以生金滋腎水以制火前論肺病而責及胃者以上不能生金也何獨不思子能令母虛而責及腎乎況肺主出氣腎主納氣咳嗽者氣不能納雖肺病而實腎病也產後瘧疾產後半月內外寒熱往來或日哺夜間發熱或一日二三度其發有期其證類瘧由氣血並竭陽虛作寒陰虛發熱也毋以瘧治柴胡湯不可輕用惟調補氣血寒熱自除欲陽藏納浮越自己產後痢疾產後腹痛瀉痢者由產後腸胃虛怯寒邪易侵故腹痛如刺水穀不化洞瀉腸鳴或下赤白急服調中湯立愈若非外因所傷乃屬腎氣虧損陽虛不能生土陰虛不能閉藏耳必用四神八味補腎倘誤投分利導水之劑是益虛其虛也產後蓐勞產後蓐勞由生產日淺血氣虛弱將養失所致使虛乏勞倦乍臥乍起容顏憔悴飲食不甘咳嗽口乾頭昏目眩百節疼痛時有盜汗寒熱如瘧四肢不舉沉重著床此皆蓐勞之候也毋論日期必須調養平復方可動作否則氣血復傷終成癆瘵其治當補脾胃為主佐以調和氣血蓋飲食一進精氣生化諸臟有所賴矣產後血崩產後血崩者因所下過多血氣大虛未得平復或因勞役或因驚恐而致也宜補心脾以統之若小腹滿痛不已為脈實大緊數者此肝陰已竭肝氣隨敗矣難治若小腹脹滿按之而痛者此內有瘀血未可遽止否則必致淋漓產後便難產後便難者由腸胃無血也大腸為傳導之官變化出焉產後津液耗損胃中枯燥而精微不及下輸是以糟粕壅滯故令便難由氣血過多內亡津液也然大腸主津小腸主液其大腸小腸更必受胃之陽氣乃能行津液於上焦今產後大虛胃中原氣已虧二腸津液並損故便難者此其宜也惟宜調中養血切不可單用麻仁枳殼徒耗腸胃中生養之氣也產後淋證產後小便淋秘之證三因云產前當安胎產後當去血此二語最為吃緊如產前淋或由氣虛不化當用參耆補氣安胎不可過用滲利產後淋或由汙血阻滯當以瞿麥蒲黃為要藥若血虛熱鬱當用六味丸逍遙散補陰養血滋其化源佐以導血藥可也更有收生不謹以致損胞而得淋瀝者丹溪曰有徐氏婦壯年患此因思肌肉破傷在外者且可補完雖在內恐亦可治診其脈虛甚因悟凡難產之人多是氣虛既產之後血氣尤虛應用峻補以參朮膏煎以豬羊胞湯極飢時飲之一月而安令氣血驟長其胞可完稍緩亦難成功也產後二便不通產後二便不通者因腸胃本挾熱產後水血俱下津液耗竭腸胃枯澀熱氣燥結故令不通也有產後患此飲人乳牛乳而通故莫若補腎蓋腎主五液腎主二陰也產後小便不禁產後遺尿者腎氣不固也五味子丸主之若脾腎虛弱以補中湯送還少丹若脾腎虛寒用八味丸四神丸佐之產後大小便出血產後小便出血者因氣血虛而熱乘之血得熱而流滲胞內故血隨小便而出也有產婦尿血面黃脅脹少食者此肝木乘脾土也用加味逍遙散補中湯兼服而愈產後大便出血者或飲食起居失宜或六淫七情過極致元氣虧損陰絡受傷也若因高粱積熱醇酒濕毒宜清之怒動肝火鬱結傷脾思慮傷心宜和肝而調心脾大腸風熱血熱宜涼血去風腸胃虛弱元氣下陷宜大補而兼升提況產後氣血大虛之後復犯絡傷失血之患可不急固脾元中氣以為攝血統血之用耶產後癰疽新產半月左右忽發癰腫於四肢胸腹者是敗血不盡流滯經絡或氣血虛弱榮氣不從逆於肉理也如敗血瘀滯者則焮腫赤痛而脈弦洪有力當補血行血之中佐以導瘀疏氣為主如氣血虛弱榮澀衛逆者則平塌散漫而脈虛微無力當大補氣血為主如十全八珍之屬以固本元扶胃氣氣壯血和其毒自解若以毒治而用清涼解毒勢必不膿不潰變成壞症矣產後月水不通產後月水不通者不必藥也婦人衝任之脈為經絡之海皆起胞內手太陽手太陰二經上為乳汁下為月水若產後去血過多乳汁常有不通若乳子半歲一歲之內月經不行此尤常候若半歲左右便行是必少壯血盛之人也若產後一二年月經不通無他疾苦亦不必服通經之藥蓋此或勞傷榮衛衝任脈虛氣血衰少耳但服健脾胃及滋補氣血之藥自然通行若強通之是猶揠苗者也產婦乳汁不行乳汁自出產婦衝任血旺脾胃氣壯飲食調勻則乳足而濃以生化之源旺也若脾胃氣弱飲食少進衝任素虧則乳少而薄所乳之子亦怯弱而多病其乳以濃白光彩入盞中上而瑩然如玉為上黃色清薄為下不可哺兒乳母宜擇肥瘦適中無病經調善食者佳太肥則多痰太瘦則多火兒飲其乳亦復如是如一兒昏睡竟日不醒舉家驚惶求醫投藥罔效一高醫診之曰此兒中酒得毋乳母曾痛飲乎詢之果然停藥而醒可見其利害相關明矣然時珍曰人乳無定性隨飲食性氣而變故飲食調攝乳母不可不慎也若乳汁不行有二有氣血盛而壅閉不行有氣血虛而燥澀不行虛者補之如十全八珍之類是也盛者疏之如麥冬栝蔞仁天花粉人參葵子豬胰木通漏蘆豬蹄之類煮食是也其有乳汁自出者若胃氣虛而不能斂攝津液者宜補胃氣以斂之若氣血大虛氣不衛外血不榮里而為妄泄者宜調補榮衛以止之若未產而乳自出謂之乳泣生子多不育若產婦勞役乳汁湧下此陽氣虛而厥也獨參湯主之產後乳癰立齋曰婦人氣血方盛乳房作脹或無兒飲痛脹寒熱用麥芽二三兩炒熟水煎服中正消取其消散精華以絕乳之源也麥芽耗散之力可見故本草謂其能消腎也若鬱怒肝火熾盛為腫為痛者自當疏肝散郁兼以養血和血則肝陽不強而腫自退若鬱結彌甚血滯不舒更由乳汁壅積潰而成膿則為乳癰矣氣血大傷尤宜重為滋補少佐疏肝解毒若專事情解則潰者難膿而膿者難長矣產後陰脫產後陰脫者多由婦人生產用力太過致陰下脫及陰下挺逼迫腫痛舉重房勞皆能發作清水續續小便淋瀝宜內服升補外以硫磺烏賊骨五味子為末摻之產後玉門不閉產門不閉由元氣素弱胎前失於調養以致血氣不能收攝故也十全大補湯有初產陰戶腫脹或焮痛不閉肝經虛熱也加味逍遙散若腫不閉者補中湯加五味子雖甚腫熱切忌寒涼產後諸證總以氣血大虛為主況陰挺下脫玉門不閉皆由氣虛血脫乎丹溪立齋醫按見症種種而治療無非參耆歸地加以升提收澀耳甚有子富腫大二日方入損落一片如豬肝面色痿黃潮熱自汗懶食困倦用十全大補湯三十劑而愈產後諸症總論產後諸症其源有三曰血虛火動曰敗血妄行曰飲食過傷何以明之氣屬陽也血屬陰也經曰陽虛生外寒陰虛生內熱蓋產後去血過多血虛火動而為煩躁發熱之類一也血猶水也水之就下性也然搏而躍之可使過顙激而行之可使在山非水之性也勢使之然也產後虛火上升敗血一行而為頭暈腹痛之類二也經云少火生氣壯火蝕氣東垣云火為元氣之賊勢不兩立一勝則一負產後元氣大傷脾胃虛弱且土位無母難以蒸腐五穀若飲食過傷則為痞滿吐瀉之類三也治之之法血虛大動則補之敗血妄行則散之飲食過傷則助脾胃以消之丹溪曰凡產後氣血虧極之際調治一切諸症皆以大補氣血為主雖有雜症以未治之產後調理煎方治氣血虛弱腰背疼痛虛熱往來咽乾喉痛將成蓐勞熟地五錢炒乾麥冬炒燥白朮乳拌炒各二錢白芍一錢二分酒炒茯苓一錢五分杜仲二錢酒拌炒黃續斷一錢五分明牛膝二錢黑姜六分如惡露不行水煎溫服生化湯產後生新去瘀神效當歸三錢川芎一錢桃仁十三粒黑姜一錢炙甘草八分水煎服奪命丹治產後血入衣中脹滿衝心久而不下附子炮去皮臍牡丹皮乾漆炒令煙盡各一兩為末用酸醋一升入大黃末一兩熬膏和藥丸桐子大溫酒下五十丸一方治產後生腸不收用枳殼二兩煎湯溫浸良久即入一方治婦人子宮不收荊芥中霍香葉中臭椿皮上煎湯熏洗子宮即入一方胎衣不下子死腹中用朴硝二錢熱童便調飲立下四味湯療才分娩一切諸疾當歸玄胡索血竭沒藥各五分一方加紅花為末用熱童便半鐘調服當歸血竭丸治產後惡物不下結聚成塊心胸痞悶脅下堅痛當歸炒血竭蓬朮芍藥各一錢一方有五靈脂為末醋糊丸桐子大每服五六十丸溫酒空心食前服瑞蓮散治產後惡血崩漏狀如泉水瑞蓮一百枚燒灰存性棕櫚燒灰存性當歸各一兩官桂五錢檳榔一枚鯉魚鱗炒川芎各七錢五分為末每服三錢煨生薑酒調如未血更進一服如血崩此藥澀治連進三服即止千金散即十全大補湯料治產後虛勞不能食白朮茯苓黃耆各一兩人參川芎熟地黃芍藥當歸各一兩肉桂一兩五錢甘草炒五錢㕮咀每服一兩薑棗水煎空心溫服人參湯治產後諸虛不足發熱盜汗歸身人參各等分為末用豬腰子一個去膜切作片子以水三升糯米半合蔥白二莖煮末熟取清汁一鍾入藥二錢煎至八分服茯苓散治產後蓐勞因生產日淺運動用力四肢寒痛寒熱加瘧茯苓一兩當歸川芎桂心白芍黃耆人參熟地黃各五錢水二鍾入豬腎一雙去脂膜細研姜三片棗二枚同煎一鍾去腎薑棗入沒藥五分煮取七分去渣食作二次溫服參蘇飲治婦人產後血入於肺面赤發喘幾死者人參一兩為末蘇木二兩捶碎水二碗煎蘇木一碗去渣調入參末隨時加減服麻仁丸治產後去血津枯大便閉澀麻子仁另研上枳殼麩炒上人參中為末蜜丸桐子大每服五十丸溫酒送下一方治產後用力太過陰門突出用四物湯煎熟入龍骨末少許空心連進二服用麻油和湯熏洗即收豬蹄湯治奶婦氣力少衰脈溫不行乳汁不通豬蹄一隻通草五兩上將豬蹄洗淨用水一斗煮作羹食之有一乳婦少家中偶煮紅豆因吃豆及湯當夜乳出如湧泉後屢用皆效湧泉散因氣乳汁少瞿麥穗麥門冬王不留行穿山甲炮黃紫龍骨等分為末每服一錢熱酒調下先食豬蹄羹後服藥以木梳梳乳上三十餘下日三服諺曰穿山甲王不留婦人吃了乳常流返魂丹治生產諸證並死胎惡而胎衣不下橫生逆產產前清熱養血產後推陳致新並效野大麻一名益母草四五月開紫花時採花葉子陰乾半斤赤芍藥六錢當歸七錢木香五錢為末蜜丸彈子大或童便酒或薄荷湯或米飲或桂枝湯或棗湯或秦艽湯隨侯酌湯化下一丸當歸羊肉湯治產後發熱自汗肢體疼痛名曰蓐勞黃耆一兩人參當歸七錢生薑五錢肥羊肉一斤煮汁去肉入前藥煎服如惡露不盡加桂辛熱自能行血也趁痛散治產後血滯筋脈拘攣腰背強直遍身疼痛黃耆當歸酒浸官桂不見火白朮獨活生薑五錢川牛膝酒浸五錢甘草炙三錢薤白三錢五分㕮咀每服四錢水煎服加桑寄生半兩尤佳川牛膝須擇粗肥長潤明黃色者佳北方以黑色者為川牛膝黃色者為懷牛膝誤也綱目注云黑者為雌牛膝堅脆無力故南方從勿入藥也
