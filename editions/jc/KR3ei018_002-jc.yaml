body:
  text: 卷二嗣育門緒論夫天地之大德曰生生之氣固流行遍滿何至於我而獨斬耶人之嗣續者上接亙古之傳下衍無疆之脈顧不甚重祖宗至令不知幾千百世一旦至我而斬孝子慈孫可不疒白小天祝壽地猛心自咎了凡先生曰愛者生之本忍則自絕其本矣素問云道者能卻老而全形年皆百數能有子也故從無絕嗣之聖賢何人不以好善樂道為本再以事副之則麟趾呈祥寧有限哉婦人無子者或經不勻或血不足或有疾病或交不時四者而已調其經而補其血去其病而節其欲無疾病而交有時豈有不妊娠者乎然更有二凡肥盛婦人稟受甚厚恣於酒食不能有胎謂之軀脂滿溢閉塞子宮宜燥濕痰如星半蒼朮臺芎香附陳皮或導痰湯之類若是瘦怯性急之人經水不調不能成胎謂之子宮乾澀無血不能攝受精氣宜涼血降火如四物加黃芩香附養陰補血及六味地黃丸之類然合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實然後交而孕孕而育育而其子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽天地者形之大也陰陽者氣之大也惟形與氣相資而立未始偏廢男女媾精萬物化生天地陰陽之形氣寓焉語七八之數七少陽也八少陰也相感而流通故女子二七天癸至男子二八而精通則陰陽交合而兆始也易曰天地氤氳萬物化醇男女媾精萬物化生天地之道陰陽和而後萬物育夫婦之道陰陽和而後男女生苟父精母血不及而有孕者未之有也是故欲求子者必先審婦之月經調否經者常也每月應期而來按期而止無易常也期有不調者或先或後或一月兩至或間月一至有絕閉不通有頻來不止或先痛而後行者或先行而後痛者有黑色者有紫色者有淡色者有白帶白淫白濁者是皆血氣不調者也諸如此類必按症用藥而調之及夫男子之病亦在所當知也有腎虛精滑有精冷精清或臨事不堅堅則流而不射堅者肝火強於外也不射者真陽弱於中也有盜汗夢遺有便濁淋澀有腰憊不能轉搖有好色以致陰虛有勞熱者有虛寒者或陽虛而氣弱或陰乏而精衰是皆精氣不足者也諸如此類亦必按症施藥而補益之若婦之精脈既調男之真精亦足所謂陰陽和氣血平則百病不生而有子且壽矣然既和之以陰陽又宜按之以方法訣曰二十時中兩日半二十八九君須算落紅滿地是佳期金水過時空霍亂霍亂之時枉費工樹頭樹底覓殘紅但解花開能結子何愁丹桂不成叢此蓋以婦人月經方止金水初生此時子宮正開而虛惟虛能受乃受精結胎之候正妙合太和之時宜以人事副之不失造化之妙也過此佳期則子宮閉而不受胎矣然男女之別各有要妙存焉月經方過一日三日交合者新血未盛精勝其血感者成男且乾道成男之義也四日六日交合者新血漸長血勝其精感者成女且坤道成女之義也又云陰血先至陽精後沖縱氣來乘血開裹精精入為骨陽內陰外而成坎卦之象是則精勝其血故陽為之主男形所由以成也若陽精先入陰血後參橫氣來助精開裹血血入居本陰內陽外而成離卦之象是則血勝其精故陰為主女形所由以成也然天地交而萬物亨陰陽和而男女育稟陽氣之偏者成男稟陰氣之偏者成女故曰乾道成男坤道成女欲嗣之廣者必由斯而求之亦由斯而得也其或不然者特繳幸於偶然耳雖孕多墮也雖產多難也雖子多病也凡男子體厚脈沉小年雖幼而陽不固是稟元氣不足也宜多服人參膏或加耆朮中年陽道痿弱身體益肥姬妾多而不孕是胃中脂膜雖盛而氣內怯也補中益氣湯加鹿角枸杞製附子鎖陽蓯蓉之類兼補相火宜減厚味肥甘使濁氣清而真精固也如脾胃不和食少倦怠每使內後益甚而不能成胎者是中氣弱而不能施化也多服補中益氣湯如黑瘦脈弦數身體多熱腸胃燥澀不能成胎者是陰水不足也雖胎亦夭宜六味加知柏歸身枸杞為丸服之務使陰陽和平而能生子不必定在熱藥也夫人至晚年無嗣醫皆責之於腎腎以主精精旺則孕成故也殊不知腎主相火心主君火一君一相本於天成君寧相服精血乃生蓋心之所藏者神神之所附者血血之所患者火也心欲萌而火動則血沸騰而神元虛耗不能下交於腎腎水虛寒精因之而妄泄所以然者由心火一動則相火翕然從之相火既動則天君亦督擾而不寧矣是以心腎有相須之義善攝生者貴有交養之方嘗觀富貴之人反多乏嗣蓋富多縱欲而傷精貴每勞心而損神要之腎精妄泄常因火迫使然心火上炎亦由水乏弗制也且人年三十以往精氣漸減不惟飲食男女之欲足以損敗一與物接則視聽言動皆足以耗神散氣而況役志勞心者復攻之以眾欲乎是以或傷精或勞神有一於此而不知節非所以保天和而廣嗣胤也男女交媾凝結成胎者雖不離精血猶為後天滓質之物而一點先天之氣萌於情欲之感者妙合於其間朱子所謂稟於有生之初悟真篇所謂生身受氣初者是也醫之上工治無子者語男則主於精語女則主於血著論立方男子以補腎為要女子以調經為先又參以補氣行氣之說察其脈絡究其盈虧審而治之自可孕也然人身氣血各有虛實寒熱之異惟察脈可知舍脈而獨言藥者妄也脈不宜大過而數數則為熱不宜不及而遲遲則為寒不宜太有力而實實者正氣虛而火邪乘之以實也當散郁以伐其邪邪去而後正可補不宜太無力而虛虛乃氣血虛也惟當調補其氣血又有女子氣多血少寒熱不調月水違期皆當診脈而以活法治之務使夫婦之脈和平有力交合有期不妄用藥乃能生子也其種子之道有匹一曰擇地地者母血是也二曰養種種者父精是也三曰乘時時者精血交感之會是也四曰投虛虛者去舊生新之初是也然少年生子多羸弱者欲盛而精薄也老年主子多強壯者欲少而精厚也多欲者子多不育蓋孕後不節則盜泄母陰以奪養胎之氣嚴冬之後必有陽春是知天地之道不收斂則不能發生故冬寒得閉藏之令者則遇陽春靡不發育此自然之理也令人既昧收藏之理縱欲竭精以耗真氣及其無子復云血冷又謂精寒燥熱之劑過投而真陰益耗矣安得而有子故無子之因不獨在女亦多由男房勞過度施泄過多精清如水或冷如水及思慮無窮皆難有子蓋心主神有所思則神馳於外致君火傷而不能降腎主智有所勞則智亂於中俾腎虧而不能升上下不交水火不媾而能生育者未之有也夫五臟各有精五臟平和則臟藏之精華輸歸於腎以資其用蓋腎為水臟乃聚會關司之所故種子有百脈齊到之論而內經有五臟盛乃能瀉之語也袁了凡曰聚精之道一曰寡欲二曰節勞三曰息怒四日戒酒五曰慎味腎為精之府凡男女交接必擾其腎腎動則精血隨之而流外雖不泄精已離宮未能堅忍者必有真精數點隨陽痿而溢出此其驗也故貴乎寡欲精成於血不獨房室之交損吾之精凡日用損血之事皆當深戒如目勞於視則精以視耗耳勞於聽則精以聽耗心勞于思則精以思耗隨事節之則血得養而精與日俱積矣故貴乎節勞主閉藏者腎也司疏泄者肝也二臟皆有相火其繫上屬於心心君火也怒則傷肝而相火動動則疏泄用事閉藏其職雖不交合亦暗流潛耗矣故貴乎息怒人身之血各歸其舍則常凝酒能動血飲酒則面赤手足俱紅是擾其血也血氣既衰之人數月無房事精始厚而可用一夜大醉精隨薄矣故宜戒酒經云精不足補以味濃郁之味不能生津惟恬淡者能補精耳蓋萬物皆有真味調和勝真味失矣不論腥素淡煮得法自有一段沖和恬淡之氣益人腸胃洪範論味而曰稼穡作甘世物惟五穀得味之正若能淡食穀味最能養精如煮粥飲中有厚汁滾作一團者此米之精液所聚也食之最能生精故宜慎味天生各物必有氤氳之時萬物化生必有樂育之候貓犬至微將受娠也其牝者必狂呼而奔跳以氤氳樂育之氣觸之不能自止此天然之節候生化之真機也凡婦人一月經行一度必有一日氤氳之候於一時辰間氣蒸而熱昏而悶有欲交接不可忍之狀此的候也此時逆而取之則成丹順而施之則成胎矣然男女交媾之時均有其精何常有血褚氏東垣丹溪俱以精血混言幾見男女媾精而婦人以血施也女子系胞於腎及心胞絡皆陰臟也虛則風寒乘襲子宮則絕孕無子非得溫暖藥則無以去風寒而資化育之妙宜用辛溫之劑必加引經至下焦走腎及心胞散風寒暖子宮為要更宜兼以補養氣血之藥若不兼補養徒事辛溫則反增燥熱之熱何以為化育之機耶故血海虛寒而不孕者誠用暖藥但人之孕胎陽精之施也必陰血能攝之精成其孕血成其胞若有真陰不足陰虛則火旺陽勝則內熱而血枯是以不能攝受精血者又不可純用辛溫之藥矣脈訣曰血旺易胎氣旺難孕故貴乎以脈消息所以不能廢診也至於父少母老生女必羸母壯父衰產男必弱古人之成語然有老者強而少者弱豈無變異其間乎但有生之初雖陽子為正育而充之必陰為之主有婦人年三十四夢與鬼交及見神堂陰司舟揖橋梁如此一十五年竟無妊娠此陽火盛於上陰水盛於下見鬼神者陰之靈神堂者陰之所舟揖橋梁水之用兩手寸脈皆沉而伏知胸中有實痰也三湧三瀉三汗不旬日而無夢一月而有娠婦人不孕亦有六淫七情之邪傷衝任或宿疾淹留傳遺臟腑或子宮虛冷或氣旺血衰或血中伏熱或脾胃損不能榮養衝任或有積血積痰凝滯胞絡更當審男子形質何如有腎虛精弱有稟受不足氣虛血損有嗜欲無度陰精衰竭各當求原而治又當審其男女尺脈若有尺脈細或虛大無力用八味丸左尺洪大按之無力用六味丸兩尺俱微細或浮大用十補丸若徒用辛熱燥血不惟無益反受其害矣世有婦人血氣充實飲食健旺而生育則少有血氣不足飲食減少而生育偏多者何蓋衛府清肌恆存辟穀楚宮細腰得之忍飢月滿則虧月虧乃盈由是觀之弱者易育實者難胎此定理也褚氏曰男女之合二情交暢陰血先至陽精後充血開裹精精入為骨而男形成陽精先入陰血後參精開裹血血入居本而女形成此成胎以精血先後分男女也聖濟經曰天之德地之氣陰陽至和流薄一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之則成女易云乾道成男坤道成女此男女之分別也此成胎以左右陰陽之氣動分男女也易云乾道成男坤道成女父精母血因感交會精之泄陽之施也血能攝精精成其骨此萬物之資始於乾元也血則外護而成胞精則內實而化育此萬物之資生於坤元也陰陽交媾胚胎始凝胎所居名曰子宮一系在下上有兩口一達於左一達於右精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成孕成而始化胎也此成胎以子宮之左右分男女也馬玄臺曰男子先天之氣方父母媾精時陰氣不勝其陽則成男凡書謂陰血先至陽精後沖縱氣來乘血開裹精陰外陽內則成男其義亦渺大約陰氣不勝其陽則為男也女子先天之氣方父母媾精時陽氣不勝其陰則為女凡書所謂陽精先入陰血後參橫氣來助精開裹血陰內陽外則成女其義亦渺大約陽氣不勝其陰則為女也此成胎以父母先天之陰陽相勝分男女也程鳴謙曰信褚氏之言則人有精先泄而生男精後泄而生女者何與信東垣之言則有經始斷交合生女經久斷交合生男亦有四五日以前交合無孕八九日以後交合有孕及變胎而一男一女者何與豈奇日受男而偶日復受女之理乎俞子木又謂微陽不能射陰弱陰不能攝陽信斯言也世有尫羸之夫祛弱之婦屢屢受胎而血氣方剛精力過人者往往有終身不育者何與丹溪論以婦人經水為主然當富貴之家侍妾亦多其中寧無月水如期者又有經前夫頻育而娶此以圖易則不受胎豈能受於彼而不能受於此耶大抵父母生子如天地生物易曰坤道其順乎承天而時行知地之生物不過順承乎天則知母之生子亦不過順承乎父而已知母之順承乎父則種子者當以男子為主矣豈可專責之於婦人耶在男子則不拘老少強弱康寧病患精之易泄難泄只以交感之時百脈齊到為善耳若男女之辨不以精血先後為拘不以經盡幾日為拘不以夜半前後交感為拘不以父母強弱為拘只以精血各由百脈齊到者別勝負耳此精之百脈齊到勝乎血則成男血之百脈齊到勝乎精則成女矣百脈齊到者暢遂之極而無一毫勉強是也此成胎以百脈齊到分男女也受胎總論李東壁曰易云一陰一陽之謂道男女媾精萬物化生乾道成男坤道成女此蓋言男女生生之機陰陽造化之良能也齊褚澄言血先至裹精則生男精先至裹血則生女陰陽均至非男非女之身精血散分駢胎品胎之兆道藏言月水亡後一三五日成男二四六日成女東垣言血海始淨一二日成男三四五成女聖濟經言因氣而左動陽資之則成男因氣而右動陰資之則成女丹溪乃非褚氏而是東垣主聖濟左右之說立論竊謂褚氏未可非也東垣亦未盡是也蓋褚氏以精血之先後言道藏以日數之奇偶言東垣以女血之盈虧言聖濟丹溪以子宮之左右言會而通之理自得矣丹溪曰或問雙胎者何也曰精氣有餘歧而分之血因分而攝之也若男女同孕者剛日陽時柔日陰時感則陰陽混雜不屬左不屬右受氣於兩岐之間也亦有三胎四胎者猶是而已人鏡經曰精氣盛則成二男血氣盛則成二女精血皆盛則成一男一女精血混雜則成非男非女男不可為父得陽道之虧者也女不可為母得陰道之塞者也皆非純氣或感邪崇鬼怪之沴氣則成異類也張按經曰陽予之正陰為之主蓋謂陽施正氣萬物方生陰為主持群形乃立更觀易論坤道其順乎天而時行則知地之生物順承乎天而母之生子亦不過順承乎父則種子者當以男子為主豈可專責之於婦人哉此誠天生地成之大道陽施陰長之至理每見男子六脈洪大尺脈有力者子多女少六脈沉細尺脈沉微者子少女多生男亦夭此屬驗也況兩神相搏合而成形神也者無形之謂也惟其無形故能生出有形蓋造化之理皆生於無也豈日數精粕有跡之謂歟故神者生身之本也然必因乎精氣何也蓋神本無體以氣為體精無定形以氣而形體物有三根本則一主雖惟神養其精氣神必附物精能凝神三者互用不可相離平叔所謂窮取生身受氣初夫水之精為志而火之精即神也蓋欲無火不動惟此一點無形元陽之真火以鼓無形默用之真神經曰根於中者命曰神機蓋以神為機發之主動用之道不期然而然物莫之知若可以言語形容者便非神之為用矣更觀邪淫苟合者無心種子偶意為之易成胎孕蓋心專神篤欲火熾而氤氳之氣濃密也安居妙合者專心種玉而兢兢業業每見無功蓋心耗神馳欲火衰而之氣反薄矣可見莫非由於神也莫非由於火也更莫非重於陽之為用也既稟天地之道而陰陽之理不能外之故陽旺多生男陰旺多生女即乾道成男坤道成女之義也更觀古載生人之候常多外因有感而成即此情之感觸亦莫非神之為用然神之為神莫非火之為精也若無火以充其神則無氣以生其精三者既失則一團死灰矣焉有陽和化育之道情性感觸之用哉古云三月始胎未有定儀氣類潛感造化密移此亦天地化工之所有何得執而為盡無先哲立言曰陽生陰長又曰陽生陰化云長云化豈無用意於其間乎孕一月名始膏二月名始胚三月名始胎當胚膏之始真氣方遇如桃花凝聚其柔脆易傷也食必忌辛辣恐散其凝結味必稍甘美欲扶其柔脆二氣既凝如泥在鈞如金在熔惟陶冶之所成食氣於母所以養其形食味於母所以養其精形精為滋育氣味為本故天之五氣地之五味母食之而子又食之外則充乎形質內則滋乎胎氣母寒亦寒母熱亦熱母飽亦飽母飢亦飢因虛而感隨感而變膏梁之家縱恣口腹暴怒淫欲飲食七情之火鍾之於內胎氣受之怯者即變為病壯者毒不即發而痘疹瘡驚貽禍於後焉故胎前可不慎為調攝乎巢氏曰妊娠一月凝成一粒如露珠然乃太極動而生陽名胚胎天一生水謂之胚足厥陰脈養之經水即閉飲食稍異二月名始膏變成赤色如桃花瓣乃太極靜而生陰地二生火謂之腪足少陽脈養之吐逆惡阻或偏嗜一物以見一臟之虛也三月名始胎手厥陰脈養之形象始化乃分男女乃太極之乾道成男坤道成女也四月始受水精以成血脈形像具六腑成手少陽脈養之五月始受火精以成陰陽之氣筋骨已成毛髮始生足太陰脈養之六月始受金精以成筋口目皆成足陽明脈養之七月始受木精以成骨遊其魂能動左手手太陰脈養之八月始受土精以成皮膚形骸漸長九竅皆成遊其魂能動右手手陽明脈養之九月始受石精以成皮毛百節畢備三轉其身足少陰脈養之十月足太陽脈養之精神備足受氣而生獨君主無為故無所養然墮胎須防一三五七月者蓋單月皆臟養胎而三月又相火所主胎最易動尤宜慎之當服清熱涼血安胎之藥然諸經有多氣少血者有多血少氣者宜各以按月養胎之臟腑氣血虛實調之自無墮胎之患矣有養胎以五行分四時論者凡人自受胎於胞門則手足十二經脈其氣血周流俱以擁養胎元豈有逐月分經某經養某月之胎之理馬玄臺已駁之矣故不具載巢氏一月二月是論受胎之月數為近理也聖濟曰或者以妊娠勿治有傷胎破血之論豈知邪氣暴戾正氣衰微苟執方無權縱而勿藥則母將羸弱子安能保上古聖人謂重身毒之有故無殞衰其大半而止蓋藥之性味本以療疾誠能處以中庸與疾適當且知半而止之亦何疑於攻治哉慎之者恐克削破血有傷胎孕耳安胎之法有二如母病以致動胎者但療母則胎自安若胎氣不固或有觸動以致母病者宜安胎則母自愈婦人年幼天癸未行行屬少陰天癸既行屬厥陰天癸既絕屬太陰治胎產病從厥陰者是祖氣生化之原也治法無犯胃氣者是後天化生之源也及上中下三禁謂不可汗不可下不可利小便恐亡其津液而傷其生氣也夫二氣之感凝而成形氣血旺則胎易成而無病氣血弱則胎多病而難育食氣於母所以養其精食味於母所以養其形故胎元以脾胃飲食為本母子咸賴之今人膏梁厚味抑鬱氣惱而氣血漸虧痰火必熾而惡阻子癇子腫等病作矣然胎前諸症皆以安胎為主務使氣血和平則百病不生若氣旺而熱熱則耗氣血而胎不安當清熱養血為主若起居飲食調養得宜絕嗜欲安養胎氣則雖成另證無大害也丹溪曰白朮黃耆為安胎之聖藥俗醫謂溫劑可以養胎不知胎前最宜清熱令血循經不妄行故能養胎白朮益脾以培萬物之母條芩瀉火能滋子戶之陰與其利而除其害其胎自安故黃芩安胎為上中二焦藥益母草治血行氣有補陰之功胎前無滯產後無虛以行氣中有補也胎至三月四月忽腹痛惟砂仁及些少木香能治痛行氣以安胎也八九月必須順氣用枳殼紫蘇之屬但氣虛者宜補氣以行滯用參朮陳皮歸芍甘草腹皮氣實者耗氣以抑陽用芩朮陳皮甘草加枳殼如將臨月胎熱者以三補丸加香湯白芍或地黃膏血虛者不外四物地黃加以益母草預為分娩地步也至於世醫安胎多用艾附砂仁為害尤甚不知血氣清和無火煎爍則胎安而固氣虛則提不住血熱則溢妄行胎欲不墮其可得乎香附雖云快氣開鬱多用則損正氣砂仁快脾氣多用亦耗真氣香燥之品氣血兩傷求以安胎適足以損胎矣惟寒鬱氣滯者宜之趙養葵曰或問白朮黃芩安胎之聖藥胎前必不可缺乎曰未盡然也胎莖之繫於腎猶鍾之繫於梁棟柱不固棟梁必撓所以安胎先固兩腎使腎中和暖始脾有生氣何必定以白朮黃芩為安胎耶凡腹中有熱胎不安者宜用涼藥然腹中有寒胎亦不安必用溫藥此常法也況兩腎中具水火之原為衝任之根而胎元之所繫甚要非白朮黃芩之所安也如腎中無水胎不安者用六味地黃壯水腎中無火者用八味地黃益火調經當用杜仲續斷阿膠艾葉當歸五味出入於六味八味湯中為捷徑總之一以貫之也諸書之所不及余特表而出之此趙氏之創論也且臟性所稟之寒熱不同有臟寒不孕服八味十補而始受娠者則受娠之後仍宜照常服之蓋臟腑服慣則不覺桂附之熱飛以為常竟相安於無事更可長養胎元也若停止暖藥加以條芩清熱之品要知能安補陽升舉者必不利補陰降下矣勢必反致墜胎之患而且有損於胎元極虛之人臟腑春夏陽和升長之氣少秋冬陰寒降下之氣多也張常治惡阻久吐不止脈微肢冷者竟用附子理中湯加五味子連服數日乃安但必參朮炙草倍加則能乘載胎元其姜附之性惟從參朮以溫補中焦即附子走下之力不能獨發以施其用矣古人用黃芩安胎是因子氣過熱不寧故用苦寒以安之然氣血旺脾胃和胎自無虞一或有乖其胎即墮是以胎無全賴氣血以滋養而氣血又藉穀氣以化生故脾為一身之津梁主內外諸氣而胎息運化之機全賴脾土故用白朮以助之然惟形瘦血熱營行過疾胎常上逼過動不安者為相宜若形盛氣衰胎常下墜者非人參舉之不安血虛火旺腹常不運者非香砂耗之不安血虛火旺腹常急痛者非歸芍養之不安體肥痰盛嘔逆眩暈者非半苓豁之不安則桂枝湯香蘇散蔥白香豉湯諒所宜用伏邪時氣尤宜急下此即安胎之要訣下藥中獨芒硝切不可犯若有客犯而用白朮便熱邪留戀不解若素患虛寒而服黃芩則中氣脾胃愈傷皆僅足以傷胎矣地之體本重然得天氣以包舉之則生機不息若重陰泣寒之區天日之光不顯則物生實罕如其人之體肌肉豐盛乃血之榮旺但血旺易至氣衰久而彌覺其偏也夫氣與血兩相維而不可偏氣為主則血流血為主則氣反不流非氣之衰也氣不流有似乎衰耳故一切補肌藥皆不可用而耗氣之藥反有可施緣氣得輔則愈錮不若耗之以助其流動久之血仍歸於統握中矣湖陽公主體肥難產南山道士迸瘦胎方而產得順利蓋肥滿之軀胎處其中全無空隙以故傷胎之藥止能耗其外之氣而不能耗其內之真氣此用藥之妙也故胎前宜順氣氣順則不滯枳殼散束胎飲皆為氣實肥盛安佚鬱悶者立法耳若氣體虛弱元氣不足或虛氣脹滿或虛寒腹痛必須參朮大補豈謂胎前必用耗氣藥乎婦人妊娠惟在抑陽助陰然胎前藥最惡群隊若藥無專一則陰陽交錯別生他病惟南山道士枳殼散所以抑陽四物湯所以助陰但枳殼散少寒單服恐有胎寒腹痛之患以內補丸佐之則陽不至強陰不至弱陰陽調而孕安蓋婦人平居陽氣微盛無諸疾病則受娠自能經閉以養胎若陽氣太盛則陽搏於陰乃經脈妄行胎始不固故貴抑陽助陰者此耳丹溪曰世之難產者往往見於鬱悶安佚之人富貴豢養之家若貧賤辛苦者無有也方書只有瘦胎飲一按其方為湖陽公主設也實非極至之論彼湖陽公主奉養太過其氣必實耗其氣使之和平故易產此南山道士迸瘦胎枳殼散抑陽降氣溫隱居加木香當歸佐之若形肥人其氣必虛久坐其氣不運而氣愈弱兒在胞胎因母氣不能自運故難產當補其母之氣則兒健易產矣遂於大全方紫蘇飲加參朮補氣藥隨母形色稟性參時加減名曰達生散人參白朮白芍當歸腹皮紫蘇陳皮甘草加枳殼砂仁勝於瘦胎散多矣胎前用藥清熱養血為主而清熱養血之後惟以補脾為要此培後天元氣之本也若養葵則不用芩術而以地黃飲加杜續以補腎夫胎繫於腎腎固則胎自安此補脾不如補腎之要妙也各具至理察候用之然勞神動怒情欲之火俱能墮胎蓋原其故皆因於熱夫火能消物造化自然如慣墮之婦或食少而中氣不調且不必養血先理脾胃次服補中益氣湯脾胃旺飲食強方能氣血有自而生也女之腎臟繫於胎是母之真氣而子所賴以生長者也受妊之後宜令鎮靜則血氣安和內遠七情外薄五味大冷大熱之物皆在所禁霧露風邪不得乘間而入亦不得交合陰陽觸動欲火謹節飲食心氣大驚而癲疾腎氣不足而解顱脾氣不和而羸瘦心氣虛乏而神不足兒從母氣不可不慎苟無胎動胎痛瀉痢風寒外邪不可輕易服藥便產須知曰勿亂服藥勿過飲酒勿妄針灸勿向非常地便勿舉重登高涉險勿恣欲行房心有大驚犯之難產子必癲癇勿多睡臥時時行步勿勞力過度使腎氣不足生子解顱衣勿太溫食勿太飽若脾胃不和榮衛虛怯子必羸瘦多病如犯修造動土犯其土氣令子破形殞命刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縛者相拘攣若有此等驗如影響切宜避之經曰何以知懷子之且生曰身有病而無邪脈也身有病者經閉也經閉之脈尺中來而斷絕無邪脈則尺中之脈和勻而無病尚未變化二月則精氣正變其氣垂蒸沖胃而為惡阻至三四月則惡陰少止脈甚滑疾蓋男女正成形質其氣沿未定也至五六月以後形質已定男女既分及八九十月血氣流通故其脈平和而如無娠非醫者深明脈理病者肯明其故難以診而知也脈訣云滑疾不散胎三月但疾不散五月母至六月後則疾速亦無矣然有始終洪數不變者其氣甚盛不可一例拘也經曰婦人足少陰脈動甚者妊子也又曰陰搏陽別謂之有子足少陰腎脈也動者如豆厥厥動搖也陰尺中也搏謂搏觸於手尺脈搏擊與寸脈殊別則有孕之兆也女人以血為本血旺是為本足氣旺則血反衰故女人以血勝氣者為貴少陰動甚者手少陰之脈也心主血動甚則血旺血旺易胎故云有子即內經所謂婦人手少陰脈動甚妊子是也尺脈者左尺足少陰腎之脈也腎為天一之水主子宮以系胞胎之根蒂也滑利則不枯澀有替替含物之象故妊娠即經所謂陰搏陽別謂之有子叔和所謂尺中之脈按之不絕全義也即此滑利之脈應指疾而不散滑為血液疾而不散乃血液斂結之象是為有胎三月若但疾而不散是從虛漸實血液堅凝轉成形體故不滑此妊娠五月之脈也崔紫虛曰陰搏於下陽別於上血氣和調有子之象手之少陰其脈動甚尺不絕此為有孕少陰屬心心主血脈腎為胞門脈應乎尺或寸脈微關滑尺數往來流利如雀之啄或診三部浮沉一止或平而虛當問月水婦人有病而無邪脈此孕非病所以不月有病者言經閉也無邪脈者尺脈和勻也王叔和曰婦人妊娠四月欲知男女法左疾為男右疾為女俱疾為生二子又曰左脈尺內偏大為男右尺內偏大為女左右俱大產二子大者如實狀也即陰搏陽別之義尺脈實大與寸脈殊別但分男左女右也又曰左脈沉實為男右脈浮大為女張景岳曰以左右分陰陽則左為陽右為陰以尺寸分陰陽則寸為陽尺為陰以脈體分陰陽則鼓搏沉實為陽虛弱浮澀為陰諸陽實者為男諸陰虛者為女為一定之論陽氣聚面男子面重胎必伏陰氣聚背女子背重胎必仰故溺死者亦然難經云腎有兩左為腎右為命門命門男子藏精女子系胞則知命門即胞門而子宮屬焉然腎有左右之別而子宮無左右之分今丹溪云男受胎在左子宮女受胎在右子宮是婦人胞門有兩子宮矣似屬鑿空無據但當雲氣血護胎而盛於左故脈左大左疾則為男氣血護胎而盛於右故脈右大右疾則為女若云盛於左子宮為男盛於右子宮為女假如品胎駢胎則子宮亦有累累耶舉要云男女之別以左右取左疾為男右疾為女沉實在左浮大在右左男右女可以預剖蓋左脈疾勝於右是為男孕以男屬陽居左胎氣鍾於陽故左勝右脈疾勝於左是為女孕以女屬陰居右胎氣鍾於陰故右勝也更又視其腹如箕為女胎腹如釜為男胎蓋男女孕於胞中女面母腹則足膝抵腹下大上小故如箕男面背母則背脊抵腹其形正圓故如釜也且胎有男女而成有遲速男動在三月陽性早也女動在五月陰性遲也又有云三月五月動者多男四月六月動者多女是奇偶之數也楊仁齋曰叔和以左手太陽浮大為女右手太陰沉細為男元實以右手浮大為女左手沉實為男較是二說不無抵悟然即脈經本旨而詳之又有若異而實同者經曰左手沉實為男右手浮大為女又曰左右手俱浮大者生二女俱沉實者生二男元賓之所主者此也經曰左手尺中浮大者男右手尺中沉細者女又曰尺脈俱浮產二男尺脈俱沉產二女叔和之所主者此也何者沉細之說與沉實之義不同右尺浮大之說與右手浮大亦異欲知男女之法大抵沉實者為男沉細者為女右尺浮大者固知其女左尺浮大者大抵皆男沉細為女沉實為男即所謂諸陽為男諸陰為女是也左尺浮大為男右尺浮大為女即所謂左疾為男右疾為女是也元賓言其詳蓋合左右兩手而列陰陽叔和言其略不過脈經論尺脈之義尚有何異同之辨哉婦人三部浮沉正等無他病而不月者孕也尺大而旺者亦然左尺洪大滑實為男右尺洪大滑實為女體弱之婦尺內按之不絕便是有子月斷病多六脈不病亦為有子所以然者體弱而脈難顯也脈經曰三部浮沉正等按之不絕者妊娠也何嘗拘於洪滑耶凡女人務調血氣充足陰陽和暢月事無愆期之患子宮無阻塞之虞固其天真壯其胃氣勿泥婦人多氣而以香附之類損其血縮砂之類殘其氣再加情性調和存養神氣柔德既彰受娠可必如此者謂之有其地矣抑男子精衰多由於七情不能致慎五臟不能相生素問曰腎者主水受五臟六腑之精而藏之五臟盛乃能瀉靈樞曰五臟主藏精藏精者不可傷蓋五臟各有精隨用而灌注於腎腎不過為都會關司之所非腎一臟獨有精也奈何舉世不察不能別臟腑之有餘不足而平之但以補腎為功不知熱則害水寒則伐火即使腎氣得補而四臟未平終無相生之理曷成孕育之功務調五臟精氣俱充心腎更足如此者謂之有其種矣天地生物必有氤氳之候萬物化生豈無樂育之時居恆必兩家寡欲至經行一度必有一日氤氳之候於一時辰之間氣蒸而熱神昏而悶有動而莫遏之狀此的候也逆而取之則成丹順而施之則成胎如此者謂之知其時候矣然有意種子兢兢業業必難結胎偶意為之不識不知成胎甚易既播種後勿復交接以擾子宮勿令勞役勿令食冷勿令疾行勿令跌僕勿令過浴勿令過醉勿令之怒勿令之驚多服健胃和中平肝養氣之藥隨時調護可無遺墮之虞蓋數月墮胎人皆知之一月墮胎人莫能覺既固其胎宜遵胎教巢氏曰妊娠三月始胎而形象始化未有定儀因感而變若欲子端正壯嚴宜口談正言身行正事欲生男者宜佩弦執弓矢欲生女者宜佩韋施環欲子美好宜佩白玉欲子賢能宜看詩書古人轉女為男之法或以絳紗囊佩雄黃於左者或潛以夫發及手足甲置席下者或以釜置床下系刃向下者或潛以雄雞尾尖長毛三莖置席下者勿令本婦知此皆外象內感告灶以雞試之則一窠皆雄也蓋胎化之法亦理之自然故食牡雞取陽精之全於天產者佩雄黃取陽精之全於地產者操弓矢藉刀斧取剛物之見人事者氣類潛感造化密移物理所有故妊婦見神像異物多生鬼怪即其徵矣象牙犀角紋逐象生山藥雞冠形隨人變以卵告灶而抱雞以苕帚掃捕而成孕物且有感況於人乎然造物有不毛之地人應之婦人有無子宮者造物無不雨露之天人應之男子皆能施化往往自失其道致斬萬世之傳圖子者可不猛然醒悟乎啟宮丸治婦人肥盛子宮脂滿壅塞不能孕育芎藭白朮半夏曲香附一兩茯苓神麯五錢橘紅甘草二錢粥丸白湯送下三錢橘半白朮燥濕以除痰香附神麯理氣以消滯川芎散郁以活血茯苓甘草去濕和中助其生氣則壅者通塞者啟矣肥而下孕多由痰盛故以二陳為君而加氣血藥也詵詵丸治婦人衝任虛寒胎孕不成或多損墜當歸酒洗焙川芎石斛酒浸炒白芍藥牡丹皮延胡索各一兩肉桂去皮五錢澤蘭葉白朮各一兩五錢乾薑泡五錢熟地黃洗焙二兩為末醋糊丸桐子大每服五十丸空心溫酒下當歸建中湯治婦人一切血氣不足虛損羸瘦當歸四兩肉桂去皮甘草炙各二兩白芍藥六兩每服五錢薑棗水煎服補中丸治婦人虛損諸疾宜常服川芎白芍藥黃耆當歸人參陳皮各五錢白朮地黃各一兩為末蜜丸每服五十丸溫水下八珍散調和榮衛滋養血氣進美飲食四物湯四君子湯等分薑棗水煎食前溫服地黃丸治腎經不足發熱作渴小便淋秘氣壅痰嗽頭目眩暈眼花耳聾咽燥舌痛牙齒不固腰膝痿軟自汗盜汗諸血失音水泛為痰血虛煩躁下部瘡瘍足跟作痛等證熟地黃八兩酒煮杵膏山茱萸酒潤枝炒乾山藥炒黃各四兩牡丹皮酒洗微炒白茯苓人乳制焙澤瀉淡鹽酒拌炒各三兩為末蜜丸如桐子大空心淡鹽湯下四錢滋血湯治婦人皮聚色落心肺俱傷血脈虛弱月水過期益氣養血人參白茯苓川芎當歸白芍山藥黃耆熟地水煎食前溫服胎前雜症門本門諸方宜於前經病門參看惡阻所謂阻者經血既閉痰水積於中阻其臟氣不得宣通也金匱曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠於法六十日當有此證設有醫者治逆卻一月加吐下者則絕之婁全善曰惡阻者謂嘔吐噁心頭眩惡食擇食是也絕之者謂絕止醫治候其自安也嘗治一二妊婦惡阻病嘔吐愈治愈逆因思仲景絕之之旨遂停藥月餘自安大哉聖人之道也徐忠可曰其期有未滿六十日則胎未成又加吐利因醫者以安胎為主見而用條芩砂仁之類則脾胃實有受傷處但當斷絕病根為主不得泥安胎之說故曰絕之婦人所食穀味化為血氣下為月水凡妊娠之初月水乍聚一月為媒二月為胚三月為胎成則男女上食於母然在三月相火化胎之候未能上食於母血氣未用五穀不化中氣壅實其為鬱滯痰火穢惡之氣盡衝於胃所以噁心有阻也其候心中憒悶頭眩四肢懈惰惡聞食氣多睡少起酷嗜酸鹽果實者乃肝腎不足引以自救也凡孕二三月間妊婦稟受怯弱便有阻病嘔逆不食或心煩悶狀如醉酒肢體沉重擇食惡食頭目昏眩此乃氣血積聚以養胎元其精血內郁而穢腐之氣上攻於胃是以嘔逆不能納食血既養胎心失所榮是以心虛煩悶法當調血散郁用參朮甘草補中氣桔紅紫蘇木香生薑散鬱氣茯苓麥冬黃芩竹茹清熱解煩名參桔飲所謂胎前須順氣者此也但胎前無寒胎後無熱至於惡阻嘔吐尤多屬熱然亦有因寒而吐者乃因病而非因惡阻也不止則虛矣當以人參乾薑半夏丸主之不可過用辛藥若吐甚而愈止愈急者用仲景法停藥月餘自安矣千金方有半夏茯苓湯茯苓丸專治惡阻比來少有服者以半夏能動胎胎初結慮其辛燥易散也須薑汁炒以制其毒凡惡阻非半夏不能止故仲景用人參半夏乾薑丸羅謙甫用二陳去陳皮甘草即名半夏茯苓湯朱丹溪謂肥人多因痰瘦人多因火用二陳加減並治胎前惡阻痰逆嘔吐心煩頭眩惡食俱效經云有故無殞是也立齋曰半夏乃健脾氣化痰滯主藥脾胃虛弱嘔吐或痰涎壅滯飲食少胎不安必用半夏茯苓湯倍加白朮安胎健脾常用甚驗也惡阻兼腰痛者防胎墮下尤宜二陳四物加條芩白朮和中理脾為主不可升舉蓋嘔逆氣已上升藥再上升則犯有升無降上更實而下更虛益促其墮矣子煩妊娠煩悶有四證有心中煩胸中煩有子煩諸屬於熱若臟虛而氣乘心令人煩者名虛煩若積痰飲嘔吐痰沫者名胸中煩或血積停飲寒熱相搏致胎氣不安謂子煩大抵多由陰既養胎孤陽獨旺心肺虛熱是以撩亂不寧更有時當盛夏君火大行俱能乘肺以致煩躁胎動不安者皆因時而致之者也亦當因時治之生脈散最佳妊娠煩躁口乾妊娠煩躁口乾者足太陰脾經其氣通於口手少陰心經其氣通於舌若臟腑氣虛熱乘心脾津液胎燥故心煩口燥與子煩大同小異宜知母丸若肝經火動加味逍遙散若腎經火動加味地黃丸古有婦人暴渴惟飲五味汁名醫耿隅診其脈曰此血欲凝非疾也已而果孕故古方有血欲凝而渴飲五味之證本屬肺腎二經有火蓋火入於肺則煩入於腎則躁胎繫於腎腎水養其胎元則不足以滋腎中之火火上爍肺變為煩躁此金虧水涸之候法當滋其化源清金保肺重濁壯水滋腎為主子懸本事方云紫蘇飲治妊娠胎氣不和壞胎逆上脹滿疼痛名子懸子懸者濁氣舉胎上湊也胎熱氣逆心胃脹滿此證挾氣者居多疏氣舒郁非紫蘇腹皮川芎陳皮無以流氣非歸芍無以養血氣血既利而胎治降然邪之所湊其正必虛故以人參甘草補之又曰有妊娠心腹脹滿者由腹內素有寒氣致令停飲與氣相爭故令心腹脹滿也須以脈之遲數辨之子滿子腫子氣子滿者婦人孕至五六個月腹大異常胸腹脹滿手足面目浮腫氣逆不安小便不通此由胞中蓄水名曰胎水若不上治生子手足軟短有疾或胎死腹中用千金鯉魚湯治其水若脾虛不運清濁不分佐以四君子若面目虛浮肢體如水氣全生白朮散若脾濕虛熱下部作腫補中湯加茯苓若飲食失節嘔吐泄瀉六君子湯若腿足發腫喘悶不寧或指縫出水天仙藤散若脾肺氣滯加味歸脾湯佐以加味逍遙散然遍身浮腫脹滿之甚者名為子滿若只腳面浮腫行走艱難或腳趾內有黃水出者謂之子氣直至分娩方消也故妊娠腳腫至八九月及脛腿俱腫非水氣比不可以水病治之反傷真氣凡有此者必易產因胞臟中水血俱多不致燥胎故也若初孕即腫者是水氣過多兒未成體則胎必墮子腫與子氣相類但子氣在下體子腫在頭面若子滿產五六月以後比子氣與子腫不同蓋胎大則腹滿滿則甚氣遍身浮腫也妊娠腹痛胎痛金匱曰婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒少腹如扇者子臟開故也當以附子湯溫其臟徐忠可曰六七月胃肺養胎而氣為寒所滯故胎愈脹寒在內腹痛惡寒然惡寒有屬表者此連腹痛乃知寒傷內矣少腹如扇陣陣作冷若扇之狀惡寒之異也且獨在少腹因子臟受寒不能合故少腹獨開不飲也子臟即子宮附子能入腎溫下焦故宜附子湯溫其經妊婦偶有所傷胎動不安痛不可忍用帶殼縮砂不拘多少和皮炒黑色為末熱酒下二錢不飲酒者米飲下腹中覺熱胎自安矣妊娠心腹痛或宿有冷疼或新觸風寒皆因臟虛而發也邪正相擊而並於氣隨氣上下上衝於心則心痛下攻於腹則腹痛邪正二氣交攻於內久若不瘥痛沖胞胎必動胎潔古地黃當歸湯治婦人有孕胎痛丹溪以血虛治之故四物湯去川芎倍加熟地此心法也妊娠不時腹痛或小腹重墜名胎痛地黃三錢當歸一錢二味煎湯主之不應加參朮陳皮因中氣虛而下墜作痛者補中益氣湯腰痛妊娠腰痛多屬勞力蓋胞系於腎勞力任重致傷胞系則腰必痛甚則胞系欲脫多至小產故宜安胎為主胎安而痛自愈痛愈而胎能安若素安逸而腰痛必房事不節致傷胞系也脈緩遇天陰或久坐而痛者濕熱也腰重如帶物而冷者寒濕也脈大而痛不已者腎虛也脈澀而日輕夜重者氣血凝滯也脈浮者風邪所乘脈實者閃挫也臨月腰痛如脫腎者將產也胎漏下血有妊婦月信不絕而胎不損問產科熊宗古答曰婦人血盛氣衰其人治肥凡既妊之後月信常來而胎不動若便以漏胎治之則胎必墮若不作漏胎治其胎未必墮今推宗古人之言誠有旨也巢氏云婦人有子之後經血蓄以養胎矣有妊而月信每至亦未必因血盛也此因榮經有風則經血喜動以風勝故也榮經既為風所勝則所下者非養胎之血若作漏胎治之服保養補胎藥胎本不損強以藥滋之是助其風行水動之勢其胎真墮矣若知榮經有風之理專以一藥治風經信可止或不服藥胎亦無恙然亦有胎本不固因房室不節先漏而後墮者須作漏胎治之千金方治妊娠下血不止名曰漏胎血儘子死用生地八兩漬酒搗汁服之無時張秘授保胎神效丸一方藥雖甚靈但內有紅花沒藥未解其意觀宗古之論始悟立方之妙今具於後保產者珍之妊娠漏胎此由衝任脈虛不能約制手太陽少陰之經血故也衝任之脈為經絡之海起於胞內手太陽少陰相為表裡上為乳汁下為月水有娠之人經水所以斷者壅之養胎也衝任氣虛則胞內泄不能制其經血故月水時下名胞漏血盡則斃又有勞役喜怒不節飲食生冷觸冒風寒子臟為風冷所乘氣血失度使胎不安故也令下血也丹溪曰胎漏多因於血熱然亦有氣虛血少服涼血藥而下血益甚食少體倦者此脾氣虛而不能攝血也當以脈候參之妊婦壯實六脈平和飲食如故余無所苦但經時下者是血氣旺而養胎之餘血也不可強止亦不可使之行但為和血涼血健脾為主佛手散加條芩白朮阿膠或八珍湯加膠艾尿血娠婦勞傷經絡熱乘於血血得熱則滲入於脬故令尿血胎漏自人門下血尿血自尿門下血妊娠尿血屬胞熱者多四物加山梔發灰或阿膠熟地麥冬五味子之類子淋孕婦小便澀少淋漓名曰子淋由氣血聚養胎元不及敷榮滲道遂使膀胱鬱熱宜歸芍調血人參補氣麥冬清肺以滋腎水之源滑石通導利小便以清鬱滯名安榮散古方內有滑石石乃鎮重之劑恐致墮胎若臨月極妙如在七八月前宜去此味加石斛山梔尤穩若日久倦怠右脈微弱者此氣虛下陷而時墜下然氣弱腸虛而難流通惟大服人參運之其便自易轉胞病胞轉證候臍下急痛小便不通凡強忍小便或風急疾走或飽食忍尿或忍尿入房使水氣上逆氣逼於胞故屈戾不得舒張所致非小腸膀胱受病而用藥所能利也法當落其氣則愈若胞落即殂凡病人稟受弱者憂悶多郁性躁急者食味厚者多有之古方用滑利藥鮮效因思胞水自轉為胎所壓胎若舉起胞系自疏水道自通矣宜補中益氣湯服後探吐以提其氣自通通後即用參耆大補恐胎墮也丹溪曰有婦妊孕九月轉胞小便不出下急腳腫不堪步診脈右澀左稍和此飽食氣傷胎系弱不能自舉下墜著膀胱偏在一邊氣急為其所閉故水竅不能出方用參朮陳皮炙草歸芍半夏生薑補血養氣氣血既旺胎系自舉頓飲之探喉令吐如是四服小便通下皆黑水復重調補而愈又妊娠七八月小便不通診之脈細弱此由中氣虛怯不能舉胎胎壓其膀胱下口因不得溺用補中湯加升舉之藥因藥力未至脹痛難忍遂令老婦用香油塗手自產戶托起其胎溺出如注脹急頓解隨以大劑參耆補之至三日後胎漸起小便如故證治曰轉胞之說胞為所逼而側名胞者即膀胱也然子淋與轉胞相類但小便頻數點滴而痛地得為子淋膀胱小腸虛熱也虛則不能制水熱則不能通利故淋若頻數出少不痛者為轉胞間有微痛終與子淋不同經曰婦子胞氣又曰胞移熱於膀胱又曰衝脈任脈皆起於胞中凡此胞字皆音包以子宮為言也靈樞曰膀胱之胞薄以懦音拋以當溲脬而為言也胞物有三而字則相同奈何後人不解其意或忍膀胱與尿胞為二物又因類纂曰膀胱者胞之室反以子胞與膀胱為一物其誤甚矣夫膀胱即脬脬即膀胱也為得復有一物居膀胱之內者乎其以子胞與膀胱為一物者試不思轉胞下壓膀胱以致小便不通者則胞在上更膀胱在下則其部位各別而非一物更明矣子喑經云婦人重生九月而喑者胞之絡脈絕也無治當十月復謂人之受孕一月肝經養胎二月膽經養胎三月心經養胎四月小腸經養胎五月脾經養胎六月胃經養胎七月肺經養胎八月大腸經養胎九月腎經養胎十月膀胱經養胎先陰經而後陽經始於木終於水以五行之相生言也然以理推之十二經之脈晝夜流行無間無日無時而不共養胎氣也必無分經養胎之理今曰九月而喑時至九月兒體已長胞宮之絡脈繫於腎經者阻絕不通故間有之蓋腎經之脈上系舌本脈道阻絕則不能言故十月分娩後而能言不必加治治之當補心腎喑謂有言而無聲故經曰不能言不能非絕然不語之謂凡音出於喉嚨發於舌本因胎氣肥大阻腎上行之經腎脈入肺循喉嚨系舌本喉者肺之部肺主聲音其人竊竊私語心雖有言而人不能聽故曰喑肺腎子母之臟故云不必治若大全解作不語則為心病以心主發聲也與子喑了不相干若張子和有降心火之說馬玄臺有補心腎之言如果腎之脈絡絕則其病不治豈有產後自復之理乎故經云胞之絡脈絕此絕字當作阻字解也中風孕婦痰涎壅盛忽然僵仆或時發搐不省人事是血虛而陰火炎上鼓動其痰左脈微數右脈滑大者名曰子癇宜四物養血酒芩清熱二陳化痰理氣故機要云風木為熱熱甚則風動宜靜勝其燥是養血也治法仍以安胎為主勿過用中風之藥蓋多由血虛則生熱熱盛則生風皆內起之風火養血而風火自滅也若心肝風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲脾郁痰滯二陳加竹瀝薑汁妊娠傷寒妊娠傷寒專以清熱安胎為主外用塗臍護胎之法其或汗或下各隨表裡所見脈證主治有表證宜汗者羌活沖和湯加柴胡當歸芍藥蘇葉蔥白之類若裡熱實症便秘躁渴者亦用大黃轉藥須酒製用有病病當之設患真寒脈伏厥冷者則用薑桂附子薑桂雖熱用黃連甘草制之則無害矣況應犯而犯似乎無犯若不急為調治以去極寒極熱之病則胎為病所困而難於保全矣奈何去病寒熱之藥人多畏之傷生寒熱之病人反安之何也妊娠瘧疾妊娠寒熱皆因氣血虛損風寒乘之風為陽邪化氣而為熱寒為陰邪化氣而為寒陰陽並挾寒熱互見經曰陽微惡寒陰弱發熱此皆虛之所致不因暑氣所作宜清解表邪兼大補氣血以主之勿泥寒熱假象也若寒熱不已熏蒸其胎胎必傷矣更有患胎瘧者一遇有胎瘧病即發此人素有肝火遇孕則水養胎元肝虛血燥寒熱往來似瘧非瘧也以逍遙散清肝火養肝血兼六味丸以滋化源妊娠痢疾妊娠飲食生冷脾胃不能克化致令心腹疼痛傷血則赤傷氣則白血氣俱傷則赤白相雜至若腹內重墜胎氣不安者此腹重墜下元氣虛而不能升舉真氣下陷也大用補中湯而自安切勿順氣行氣益增墜下之患胎繫於腎如鍾繫於梁棟柱不固棟梁必撓而鍾豈能獨全哉況似痢非痢者多中氣虛則不能上升脾氣虛則不能滲濕腎氣虛則不能閉藏慎勿以有形之假滯而傷無形之元氣至元氣一傷變症百出矣胎能保乎妊娠霍亂霍亂者因甘肥過度腐積成痰七情鬱結氣盛為火停蓄胃中乍因寒熱之感邪正交爭陰陽相混故令心腹絞痛吐利並作揮霍變亂如邪在上胃脘則當心痛而吐多邪在下胃脘則當臍痛而利多邪在中脘則腹中痛吐利俱多吐多則傷氣利多則傷血血氣受傷不能護養其胎邪氣鼓擊胎元子母未有不殞者此危症不可不亟治也宜香蘇散加藿香先服後探吐之妊娠泄瀉不外脾腎二臟虛者居多夫血統於脾血擁胎元則脾陰虛而食不運化脾主健運下焦壅滯而清氣難舒於是水穀難消而作瀉且胎繫於腎胎竊其氣以擁護而腎氣既弱命門火衰不能上蒸脾土此妊娠泄瀉之由也雖其間不無風寒暑濕之外感飲食生冷之內傷然屬於脾腎有虧者乃其本也妊娠傷食妊娠傷食多由脾胃中氣虛弱不能運化若中氣壯實無是病也然胎以脾胃為主脾胃強則胎系如懸鐘而不墜若傷食不化則脾困而胎不能固故凡即消食導滯皆先以補脾健胃為主而推揚穀氣則飲食自化若徒事消克不但胎元易墜且脾虛而愈虛之化源之機竭矣妊娠吐血凡七情內傷六淫外感皆足致失血之患而妊娠吐血一主火熱者以氣血壅養胎元或有所感則氣逆而火上乘心心煩滿悶血隨而溢也但火略有虛實之分實火當清熱以養血虛火當滋陰以補水則血可安而胎可固若泛用行血消血之劑胎必墮而禍不旋踵矣妊娠胎逆作喘有婦人胎死於腹病喘不得臥診其脈氣口盛人迎一倍左關絃動而疾兩尺俱短而離經因曰病蓋得之毒藥動血以致死胎不下奔迫上衝非風寒作喘也大劑芎歸湯加催生藥服之夜半果下一死胎而喘止其夫曰病妾誠有懷以室人見嫉故藥去之眾所不知也然妊娠氣喘有乍感風寒而不得臥者客邪盛也發散自愈參蘇飲主之若脾虛四肢無力肺虛不任風寒腎虛腰痠短氣不能行步猝然氣喘不息此脾肺素虧母虛子亦虛腎氣不歸元而上乘於肺也生脈散補中湯去升柴主之丹溪所謂火動作喘此胎前最多至於毒藥傷胎病喘世俗往往有之病機之不可不察者也婦人臟躁悲傷仲景曰婦人臟躁喜悲傷欲哭象如神靈所憑數欠伸甘麥大棗湯主之立齋治一妊婦悲哀煩躁其夫詢之云我無故但欲自悲耳用仲景方又用淡竹茹湯佐八珍湯而愈故妊娠無故悲傷屬肺病臟躁者肺之臟燥也胎前氣血壅養胎元則津液不能充潤而肺為之燥肺燥當補母故有甘草大棗以補脾若立齋用八珍湯補養氣血更發前人之所未盡腹內兒哭產寶曰腹中臍帶上疙瘩兒含口中因妊婦登高舉臂脫出兒口以此作聲令妊婦曲腰就地如拾物狀仍入口中即止又云孕婦腹中兒哭治法用空房中鼠穴土同川黃連濃煎汁飲之即止胎動胎漏妊娠胎動不安者由衝任經虛受胎不實也有飲酒房事過度損動不安有忤觸傷僕而動不安有怒氣傷肝或鬱結不舒觸動血脈不安有過服暖藥並犯禁之藥動而不安有因母病而胎動者但治母病其胎自安有因胎不堅固動及母病者但當安胎其母自愈若面赤舌青是兒死也面青舌赤是母死也唇口面舌俱青吐沫者是子母俱死然胎動與胎漏皆有下血胎動則腹痛胎漏無腹痛胎動宜調氣胎漏宜清熱然子宮久虛多令墜胎其危同於風燭非正產可比急以杜仲丸預服以保胎元子死腹中胞衣未下急於胎之未生子死腹中危於胎之未下蓋胞衣未下子與母氣尚通呼吸若子死腹中胞臟氣寒胎血凝沍氣不升降古方多以行血順氣藥及硝石水銀硇砂之類但其胎已死則軀形已冷血凝氣聚復以至寒之藥下之不惟無益而害母命者多矣不知古人立方深於用意蓋子死之故因有二端用藥寒溫各存至理有妊娠胎漏血儘子死者有墜墮顛仆內傷子死者有久病胎萎子死者以附子湯進三服使胞臟溫暖凝血流動蓋附子能破寒氣墮胎此用溫藥之意也有因傷寒熱病溫瘧之類胎受邪熱毒氣內外交攻因致胎死留於胞臟古人深慮胎受毒氣必然脹大故用朴硝水銀硇砂之藥不惟使胎不脹又能使胎形化爛再副以行血順氣之藥死胎即下此古人立方之至意也凡脈三陽俱盛名曰雙軀若少陰微緊者謂督脈血即凝濁經養不周胎即偏夭其一獨死其一獨生不去其死害母失胎千金神造散主之是方耑治雙胎一胎生一胎死者用蟹爪以去其死阿膠以安其生甘草和藥性立方之心意深遠矣人之胃氣壯實衝任榮和則胎得其所如魚處深澗自然和暢若氣血虛弱無以滋養其胎終不能成宜下之以免其禍然胎傷宜下而下法最宜謹慎如胎死腹中心先蹎舌青腹冷口穢的確方可用下也必先固妊婦本元補氣養血而後下之如遇有不安未能詳審遂用峻厲攻伐能免不測之禍此要訣云順其自然四字最妙立齋亦云胎果不能安者方可議下慎之慎之前賢之垂戒深矣若欲下之朴硝斷不可少墮胎妊娠受胎七日一變今婦人墮胎必在三月五月七月者多在二月四月六月者少蓋諸經養胎臟陰而腑陽三月屬心五月屬脾七月屬肺皆在五臟之脈陰常易虧故多墮耳如在三月曾墮後孕至期必乘其所虛而三月亦墮以心脈受傷故也須預於二月先調其心五月七月亦然必多服健脾益氣養榮之藥一有胎後日不可間乃佳惟一月墮胎人所不知一月屬肝怒則多墮洗下體則竅開亦墮一次既墮肝脈受傷下次亦墮今之無子者大半一月墮胎非盡不受孕也故凡初交後最宜將息勿復交接以擾子宮勿令勞怒勿舉重勿洗浴又多服養肝平氣藥則無一再之墜而胎固矣若連墮數次胎元損甚者服藥須多蓋久則胎元可復其藥以養榮調氣補腎益脾如四物湯去川芎生地換熟地加人參白朮陳皮條芩阿膠續斷杜仲之類如有跌撲所傷須逐汙生新為主佛手散最妙腹痛加益母草服下痛止則子母俱安如胎已損則汙物並下再加童便制香附益母草陳皮煎濃汁飲之如從高墜下腹痛下血煩悶加生地黃耆補以安之如因使內腹痛下血加參朮陳皮茯苓炙甘草砂仁末以保之如胎下而去血過多昏悶欲絕脈大無力用濃厚獨參湯沖童便服之小產本由氣血大虛今當產後益虛其虛矣故較正產尤宜調補巢氏論諸經脈養胎各三十日而十二經中獨心與小腸不養胎何也心為牡臟小腸為腑主生血而合脈經曰臟直通於心心藏血脈之氣也有孕則經脈不通所謂閉經以養胎也是知胎以血為本始終皆在於心自不當以輸養分次第矣三月之時心包絡養胎靈樞云心包主脈若分氣及胎脈必虛代經云心合脈蓋心與包雖分二經其實原屬一臟也若至期當養之經虛實不調則胎必不安甚則下血而胎墮矣夫陽施陰化胎孕乃成胎寒則痛胎熱多驚若血氣虛損不足以榮養其胎則自墮矣譬之枝枯則果落藤萎則花墜有因七情太過五火內發火能消物而墮者有因勞力閃挫傷動其胎而墮者有因怒動肝火疏泄用事而墮者有因過於房事盜泄胎元而墮者正如風撼其樹而根本為動搖也然小產重於大產蓋胎臟損傷胞系腐爛治宜大補榮衛生肌肉養臟氣略佐消瘀若素有墮胎之患者宜按症預為早治臨期補之無及也妊娠半產非七情六淫勞役房室則無是患故用藥與正產無殊總不外丹溪大補氣血為主如三四月前胎未成形而下者名曰墮胎至五六月後胎已成形而下者名曰半產總屬妊婦氣血虛弱衝任經虛以致胎元不固愈遲者而氣血愈虛也故千金保胎元不固愈遲者而氣血愈虛也故千金保胎丸一方最妙而趙養葵以六味飲加杜續五味阿膠尤佳誠為安胎之聖藥也小產不可輕視視養十倍於正產大產如慄熟自脫小產如生採之破其皮殼斷其根蒂也忽略成病者不少因而致死者恆多然此症始因斂血以成胎繼因精血以長養終因精血不足而萎墮故瘀血甚少倘有腹痛成塊有形多屬血虛氣逆惟加大為溫補則新者生而瘀者去若加消瘀破滯則逆氣愈攻而愈升多致不救戒之哉況有血虛而腹痛者更有真陰虧損不能納氣以致疝瘕為患者更有真陰虧損不能納氣以致疝瘕為患者更有真陰虧損不能納氣以致疝瘕為患者更有真陰虧損不能納氣以致疝瘕為患者張常以八味丸加牛膝五味子者早晚吞服而安驢馬有孕牡者近則蹄之名為護胎所以絕無小產人之胎系胞中有氣血以養之靜則神藏欲火一動則精神走泄火擾於中則胎自墮矣種玉者可知欲而不知忌乎丹溪曰有婦經住三月後尺脈或澀或微弱其婦卻無病知是子宮真氣不全故陽不施陰不化精血雖凝終不成形至產血塊或產血胞也惟脈洪盛者胎可不墮耳半產者此氣血不續而不能長養胎元也然氣血不足之中尚有性稟偏陰偏陽或寒或熱之異自當憑脈調治如陰虛內熱者而用艾附白朮砂仁溫暖之劑則陰道愈消如草木之無雨露自然枯萎也如陽虛內寒者而用芩芍涼血之劑則脾胃虛寒氣血益弱猶果品春夏易生秋冬少結也故辨症合宜雖大寒大熱俱可益人經所謂應犯而犯似乎無犯也胎孕不長或問娠婦有按月行經而胎自長者有三五個月間其血大下而胎不墮者或及期而分娩或逾月而始生其理何與按月行經而胎長者名曰盛胎其婦血氣充盛養胎之外血有餘故也有數月之胎而敵國大下謂之漏胎因事觸胎動其任脈故血下而不傷子宮也然孕中失血胎雖不墮氣血亦虧多至逾月不產曾見有十二三月或十七八月或二十餘月而生者皆是血氣不足胚胎難長故耳凡十月之後未產者當服大補氣血之藥以培養之庶無分娩之患總錄曰人受氣於有生十二經脈迭相滋養凡胎處胞中或有萎燥者由孕婦所稟怯弱不足自周陰陽血氣偏勝非冷即熱胞胎失於滋養所以萎燥不長也惟宜資母血氣則胎有自而長矣胎孕變常記李時珍曰女子二七天癸至七七天癸絕此其常也有女年十二十三而生子如褚記室所載平江蘇達卿之女年十二受孕有婦人年至五十六十而生子如遼史所載亟昔妻年六十生二男二女此又異常之尤者也鬼胎人之髒髒調和則血氣充實風邪鬼魅不能幹之若榮虛衛損精神衰弱妖魅鬼精得以感之狀如懷孕故曰鬼胎也然虞天民曰晝之所思為夜之所見凡男女之性淫而虛者肝腎相火無時不起故勞怯人多夢與鬼交所謂鬼胎者偽胎也非實有鬼神交接成胎也即經所謂思想無窮所欲不遂為白淫白濁流於子宮之內遂結為鬼胎本婦自己之血液淫精結聚成塊胸腹脹滿儼若胎孕耳非偽胎而何滑伯仁醫驗有楊氏女薄暮遊廟廟廡見一黃衣神人覺心動是夕夢與交腹漸大如孕伯仁診之曰此鬼胎也女乃道其故遂與破血墜胎之藥下如蝌蚪魚目者約二升許遂安此非遇神交乎曰有是事實無是理豈有土木為形能與人交而有精成胎耶天下必無是理也推其故此非神之惑於女實乃女之感於神有以致之耳立齋曰鬼胎因七情相干脾肺虧損血氣虛弱失行常道衝任有乖致之乃元氣不足病氣有餘也若見經候不調即行調補庶免此症以補元氣為主佐以行散之藥一婦經閉八月肚腹漸大面色或青或黃用胎證藥不應診視之面青脈澀寒熱往來肝經血病也面黃腹大少食倦怠脾經血病也此鬱怒傷脾肝之證非胎也用加味歸脾逍遙二藥而愈腸覃似孕經云腸覃者寒氣客於腸外與衛氣相搏氣不得榮因有所繫瘕而內著惡氣乃起息肉乃生其始生大如雞卵稍以益大如懷子之狀按之則堅推之不移月事以時下此其候也此氣病而血未病故月事不斷木香通氣散大辛熱之劑主之此結氣大腸為氣病蓄血似孕折肱錄曰子媳申氏多鬱怒勿患不月腹漸大以為妊也十餘月勿產諸證漸見疑之醫者亦疑為蓄血欲下以體弱不勝可暗消久用行血調血藥竟至不起後閱盛啟東治東宮妃一案大悔掉永樂東宮妃張氏經不通者已十越月醫以為胎也脹愈甚上命啟東診視一一如見其方皆破血之劑下血數斗而疾平子媳病正與此合當十月外既確知非妊宜大膽下之可得生矣惜醫者無此膽識不亦傷乎此蓄血子門為血病產前總論產前諸症皆因胎氣所致夫胎動胎漏皆下血但胎動有腹痛胎漏無腹痛故胎動宜行氣胎漏宜清熱也惡阻者噁心而阻隔飲食也肥者多因痰瘦者多因熱宜二陳湯加減子煩者煩躁悶亂心神也子癇者痰涎潮搐目吊口噤也子腫者面目虛浮肢體腫滿也子氣者兩足浮腫也子淋者小便艱少也轉胞者小便不通也子懸者胎氣不順湊心脹痛也蓋脾主運化水穀婦人有胎則運化水穀不利而生濕濕則生痰痰生熱熱生風也子腫子氣者濕也惡阻者痰也子煩子淋者熱也子癇者風也子懸者氣也轉胞者虛也濕則滲之痰則消之熱則清之風則平之氣則散之虛則補之總以去邪保胎為要保胎之法三月以前宜養脾胃四月以後宜壯腰腎補血順氣佐以清熱此大法也然尤宜以人陰陽盛衰氣血偏勝而調之簡便方治頻慣墮胎或三四月即墮者於兩月前以杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾為末山藥五六兩為末糊丸如梧子大每服五十丸空心米飲下懷妊受物乃肝一臟之虛其肝氣止能生胎無別用也若血少不能榮其肝則肝虛故愛酸物產前安胎白朮黃芩為妙藥也條芩安胎之聖藥俗人不知以為寒而不敢用反為溫熱之藥可養胎殊不知產前宜清熱令血循經而不妄行故能養胎惟脈沉遲脾胃虛弱者非其所宜生產如抱船過壩一般凡難產者多由於氣血虛也有因九十月之時不謹守者有之有氣血凝滯不轉運者故於九個月內便須順氣調中服達生散十數帖臨產自易也凡妊婦脈細勻者是胎元已足如果熟香飄之象也易產大浮緩者是養胎而中氣大虛火氣散也難產故產前脈宜洪大產後脈宜沉小凡男女之別以左右取左疾為男右疾為女沉實在左浮大在右右女左男可以預剖離經六至沉細而滑陣痛達腰胎立時脫半產漏下革脈主之弱即血耗立見傾危一婦妊娠久吐不已諸藥不受張立後方服之而愈兩寸俱洪大而數右尤甚焉金體本燥今燥益甚矣左關洪弦是肝主藏血今無血受藏也右關弦細而數是久生穀氣肝家虛火來侮因而弦數其細者胃氣虧極之象也左尺細極若無右尺洪大而疾此皆津滋燥涸少陰虛火上浮厥陰鬱火上達少陽伏火上乘燥涸之土為三火所爍焉能濕潤化育乎經曰諸嘔吐酸皆屬於熱此之謂也具方於後為救急治標之法嘔愈之後仍當以六味加麥冬阿膠為丸久服調理以治其本條實芩一錢二分麥門冬去心三錢懷生地三錢廣桔紅鹽湯泡七分白茯苓一錢二分生白芍藥肥白知母各一錢二分甘草二分白葛根一錢能提胃中真氣而清疏胃熱故用之竹茹二錢用鮮淡竹刮去青取向里黃皮加燈心水煎溫服即愈保胎神效丸方錦囊秘傳白茯苓二兩色白堅重者用之真於朮一兩米泔浸一宿去皮淨切並曬乾同黃土炒用條芩酒拌炒須揀實心細子香附子童便浸二日炒熟元胡索陳米醋拌炒紅花隔紙烘炒益母草淨葉各一兩真沒藥三錢新瓦上隔火焙去油上各制度為末蜜丸桐子大每日空心白湯吞服七丸前藥不可因其丸小加至七丸之外凡孕婦胎不安者一日可服四五次安則照常如遇腹痛腰痠或作脹墜宜即服之如受胎三五月常墜者須先一月制服能保足月甚至見紅將墜者急服此丸亦能保留謹戒惱怒勞力忌食煎炒椒辣發氣閉氣糟味冷水冷物切戒心勞每藥一料可保數胎但服此丸無不收效茯苓丸治妊娠惡阻停飲憂聞食氣赤茯苓人參肉桂乾薑泡半夏洗七次焙陳皮白朮葛根甘草炙枳實去白麩炒黃各一兩為末蜜丸如梧子大每服五十丸空心米飲下一法用黃芩為末濃煎白朮湯調一錢服一月餘自安杜仲丸治妊娠兩三月胎動不安防其欲墮預宜服之杜仲去皮剉薑汁炒去絲川續斷酒浸各二兩為末棗肉煮爛為丸梧子大每服三十丸米飲下膠艾湯治妊娠或因倒僕胎動不安腰腹疼痛熟地黃洗艾葉炒白芍藥川芎阿膠蛤粉炒成珠黃耆當歸酒浸甘草炙各等分用薑棗水煎服如虛者加人參益母丸專治難產橫逆並安胎順氣益母草五月五日採葉莖陰乾忌鐵器為末蜜丸如彈子大每服一丸臨產之時以童便溫酒化下若氣不順用木香人參湯桑寄生散治胎漏經行淋漓無病調理胎元當歸酒浸桑寄生續斷酒浸川芎白朮熟地人參香附炒阿膠蛤粉拌炒茯神各一錢甘草炙五分水煎服三因鯉魚湯治妊娠腹大胎間有水氣白朮五兩茯苓四兩當歸芍藥各二兩上細剉以鯉魚一個修事如食法煮取汁去魚用藥四錢入魚汁一鍾半生薑七片陳皮少許煎至七分空心服下一方無故卒下血用阿膠二兩蛤粉炒成珠生地黃八兩搗取汁以清酒三升將二味攪勻溫熱分三服飲之竹茹湯治妊娠嘔吐頭疼眩暈桔紅去白人參麥門冬去心白朮各一兩厚朴薑製茯苓各五錢甘草二錢五分每服五錢水二鍾姜五片入竹茹如彈子大一塊煎至八分服竹葉湯治妊娠心驚膽怯終日煩悶證曰子煩白茯苓四兩防風麥門冬去心黃芩各三兩每服四錢水一鍾竹葉五片不拘何時皆可服之全生白朮散治妊娠面目肢體浮腫如水氣名曰子氣白朮一兩姜皮大腹皮陳皮白茯苓皮各五錢為末每服二錢米飲調下一方有桑白皮李氏天仙藤散治妊娠三月之後兩足漸腫行步艱難飲食不佳狀如水氣名曰子氣天仙藤洗略炒香附子炒陳皮甘草烏藥各等分為末每服三錢姜三片紫蘇三葉木瓜三片同煎空心食前服之日三次腫消止藥紫蘇散治胎氣不和湊上心腹脹滿疼痛謂之子懸大腹皮川芎白芍陳皮當歸去蘆酒浸紫蘇葉各一兩人參甘草各五錢每服四錢姜五片蔥白七寸水煎空心溫服兒在腹中哭用多年空屋鼠穴中土一塊令孕婦噙之百合散治妊娠咳嗽心胸不利煩滿不食胎動不安川百合紫苑麥門冬桔梗桑白皮各一兩甘草五錢竹茹一團每服八錢水煎去滓入蜜半匙再煎一二沸食後溫服乾薑黃連丸治妊娠下痢赤白穀道腫痛冷熱皆可服乾薑炒黑黃連去須縮砂仁炒川芎阿膠蛤粉炒白朮各一兩乳香三錢別研枳殼五錢炒為末用鹽梅肉三個入醋糊同杵丸桐子大每服四十丸白痢乾薑湯赤痢甘草湯下赤白痢乾薑甘草湯下勝金散治妊娠脾胃氣冷小腹虛脹吳茱萸酒浸炒陳皮生薑乾薑炮川芎厚朴縮砂仁炒甘草各等分為末每服二錢鹽湯調服桑螵蛸散治妊娠小便不禁桑螵蛸二十個炙為細末每服二錢空心米飲調下瘦胎枳殼散治妊娠孕七八月常宜服滑胎易產甘草一兩五錢炙枳殼五兩麩炒赤一方加香附為末每服一錢空心白湯服按枳殼散性苦寒單服恐有胎寒胎痛之疾以地黃當歸湯蜜丸佐之束胎散第八個月可服條芩酒炒一兩白朮二兩不見火陳皮三兩茯苓七錢五分不見火為末粥丸梧子大每服五六十丸食遠溫水下達生散大腹皮三錢人參陳皮各五錢白朮芍藥歸尾各一錢甘草炙二錢紫蘇莖葉五分加青蔥五葉黃楊腦七個即黃楊樹葉梢兒或加枳殼砂仁水煎食後服八九月服十數帖甚妙夏月加黃芩冬不必加春加川芎催生如聖散黃葵花焙乾為末熱湯調下二錢神效或有漏血胎臟乾澀難產痛劇者並進三服良久腹中氣寬胎滑即時產下如無花以黃蜀葵子為末酒服二錢如胎死不下紅花煎酒調下經驗方用子四十九粒或三十粒催生佛手散治妊娠因事觸胎子死腹中疼痛口噤用此探之不損則痛止子母俱安損則立下當歸六錢川芎四錢水二鍾半煎令泣欲干入頭酒一鍾煎沸溫服口噤灌之如人行五里再服不過三服便生催生丹治產婦生理不順臨蓐艱難十二月兔腦髓三皮膜研乳香研細一分麝香研細一字母丁香末一錢研勻用兔髓和丸如雞頭大陰乾油紙封貯每一丸研破溫水服即時產下隨男左女右握藥出是驗一方治婦人難產數日不出桃仁一個劈開硃砂寫一片可字一片出字吞之即生救生散橫生逆產用桂心一錢為末童便酒調服之異常神效一方治難產用臘月兔頭一枚燒灰為末蔥白湯調下二錢立時即生或用伏龍肝細研每服一錢酒調服之亦效香桂散下死胎麝香五分另研官桂二錢為末和勻酒調服須臾如手推下一方死胎不出產婦面青指甲青口臭用朴硝為末每服二錢順流水調下甚者溫童便調服胎下母活亦治胎衣不下黑龍丹治臨產難生或胎衣不下產後血暈不省人事血崩惡露腹中刺痛血滯浮腫血入心經語言顛倒血風相搏身熱頭痛或類瘧疾胎前產後諸疾垂死無不救活者五靈脂當歸酒浸生地黃川芎良薑各二兩上入砂鍋內紙觔鹽泥封固煅紅候冷取出研細入後藥百草霜三錢乳香生硫黃琥珀花蕊石各二錢上五味計一兩一錢為末同前藥和勻米醋煮麥糊丸如彈子大每臨用炭火煅藥通紅投入生薑自然汁浸碎之以無灰酒併合童便頓服神效不可盡述新定催生保產萬全湯人參三錢至五錢當歸去蘆三錢川芎一錢桃仁十三粒不去皮尖搗碎乾薑炒焦黃一錢甘草炙六分牛膝梢二錢紅花酒炒三分肉桂去皮六分冬天八分加棗一枚水煎溫服
